<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>leeyuchen</title>
    <link rel="stylesheet" href="https://npm.elemecdn.com/lxgw-wenkai-webfont@1.1.0/lxgwwenkai-regular.css">
    <style>
        /* 全局重置：重置所有元素的默认样式，确保跨浏览器一致性 */
        * {
            margin: 0; /* 重置所有元素的外边距为0 */
            padding: 0; /* 重置所有元素的内边距为0 */
            box-sizing: border-box; /* 使元素的宽度和高度包括内边距和边框 */
        }

        /* 通用类：可点击元素 */
        .clickable {
            cursor: pointer; /* 鼠标指针为手型 */
            user-select: none; /* 禁止文本选择 */
        }

        /* 主体样式：控制整个页面的基本样式 */
        body {
            font-family: 'LXGW WenKai', 'Microsoft YaHei', sans-serif; /* 设置字体为LXGW WenKai，备选为Microsoft YaHei */
            -webkit-font-smoothing: antialiased; /* 使字体在WebKit浏览器中更平滑 */
            -moz-osx-font-smoothing: grayscale; /* 使字体在Firefox on OS X中更平滑 */
            text-rendering: optimizeLegibility; /* 优化文本渲染，提高可读性 */
            overflow: hidden; /* 隐藏页面滚动条 */
            height: 100vh; /* 设置页面高度为视口高度 */
            position: relative; /* 设置为相对定位，作为绝对定位元素的父容器 */
        }

        /* 彩虹动画：定义渐变背景的动画效果，用于下划线和开关按钮 */
        @keyframes rainbow {
            0% { background-position: 0% 50%; } /* 动画开始时背景位置 */
            100% { background-position: 100% 50%; } /* 动画结束时背景位置 */
        }

        /* 网页加载时背景容器：控制页面背景图片的容器 */
        .background-container {
            position: fixed; /* 固定定位，覆盖整个视口 */
            top: 0; /* 顶部定位为0 */
            left: 0; /* 左侧定位为0 */
            width: 100%; /* 宽度为100% */
            height: 100%; /* 高度为100% */
            z-index: -1; /* 层级为-1，位于其他元素下方 */
            opacity: 0; /* 初始透明度为0，隐藏状态 */
            transform: scale(1.25); /* 初始缩放为1.25倍 */
            filter: blur(20px); /* 初始模糊效果为20px */
            transition: all 1.0125s ease; /* 所有属性的过渡效果，持续1.3秒 */
            will-change: opacity, transform, filter; /* 告诉浏览器这些属性将要变化 */
            user-select: none; /* 禁止文本选择 */
        }

        /* 背景容器加载状态：控制背景容器加载完成后的显示效果 */
        .background-container.loaded {
            opacity: 1; /* 透明度为1，完全显示 */
            transform: scale(1); /* 缩放为1倍，恢复原始大小 */
            filter: blur(0px); /* 模糊效果为0，清晰显示 */
        }

        /* 设置背景容器模糊状态：控制搜索框聚焦时背景的模糊效果 */
        .background-container.blur {
            filter: blur(10px); /* 模糊效果为10px */
        }

        /* 背景图片：控制背景图片的样式 */
        .background-container img {
            width: 100%; /* 宽度为100% */
            height: 100%; /* 高度为100% */
            object-fit: cover; /* 图片覆盖整个容器，保持比例 */
            transition: transform 1.0375s ease; /* 变换属性的过渡效果，持续1.25秒 */
            transform: translateZ(0); /* 触发硬件加速，提高动画性能 */
            will-change: transform; /* 告诉浏览器变换属性将要改变，优化渲染 */
            user-select: none; /* 禁止文本选择 */
        }

        /* 搜索框选中背景图片缩放效果：控制搜索框聚焦时背景图片的缩放效果 */
        .background-container.zoom-in {
            transform: scale(1.125); /* 缩放为1.125倍 */
            transition: all 0.8875s ease; /* 保持与父元素一致的过渡效果 */
            transform-origin: center center; /* 确保变换原点在中心 */
        }

        /* 设置窗口背景图片缩放效果：控制设置窗口打开时背景图片的缩放效果 */
        .background-container.settings-zoom {
            transform: scale(1.0625); /* 缩放为1.0625倍 */
            transition: all 0.75s ease; /* 保持与父元素一致的过渡效果 */
            transform-origin: center center; /* 确保变换原点在中心 */
        }

        /* 壁纸遮罩：控制壁纸的遮罩效果，使背景变暗 */
        .background-container.mask {
            filter: brightness(65%); /* 亮度调整为65%，使背景变暗 */
        }

        /* 主容器：包含时间显示和搜索功能的主要内容区域 */
        .main-container {
            position: fixed; /* 固定定位，覆盖整个视口 */
            top: 0; /* 顶部定位为0 */
            left: 0; /* 左侧定位为0 */
            width: 100%; /* 宽度为100% */
            height: 100vh; /* 高度为视口高度 */
            z-index: 2; /* 层级为2，位于背景容器上方 */
            color: white; /* 文本颜色为白色 */
            text-align: center; /* 文本居中对齐 */
            padding: 20px; /* 内边距为20px */
        }

        /* 时间显示容器：控制时间、日期和农历信息的显示容器 */
        .time-display {
            position: absolute; /* 绝对定位 */
            top: 20%; /* 顶部定位为20% */
            left: 50%; /* 左侧定位为50% */
            transform: translateX(-50%) translateY(-100px); /* 水平居中，垂直向上移动100px */
            opacity: 0; /* 初始透明度为0，隐藏状态 */
            transition: all 0.8s ease; /* 所有属性的过渡效果，持续0.8秒 */
            z-index: 2; /* 层级为2 */
            text-align: center; /* 文本居中对齐 */
            width: 90%; /* 宽度为90%，确保在小屏幕上不会溢出 */
            max-width: 600px; /* 最大宽度为600px */
            will-change: opacity, transform; /* 告诉浏览器这些属性将要变化 */
        }

        /* 时间显示：控制具体时间的显示样式 */
        .time {
            font-size: 4.0625rem; /* 字体大小为4.0625rem */
            font-weight: bold; /* 字体粗细为粗体 */
            text-shadow: 0 2px 10px rgba(0,0,0,0.5); /* 文本阴影效果 */
            position: relative; /* 相对定位，作为伪元素的父容器 */
            display: inline-block; /* 内联块级元素 */
            user-select: none; /* 禁止文本选择 */
        }



        /* 时间显示动画：控制时间显示容器的入场动画 */
        .time-display.animate-in {
            transform: translateX(-50%) translateY(0); /* 水平居中，垂直位置恢复 */
            opacity: 1; /* 透明度为1，完全显示 */
        }

        /* 时间显示浮动效果：控制搜索框聚焦时时间显示的浮动效果 */
        .time-display.floating {
            transform: translateX(-50%) translateY(25px); /* 水平居中，垂直向下移动25px */
        }

        /* 响应式时间显示容器：控制小屏幕设备上时间显示容器的位置 */
        @media (max-width: 768px) {
            .time-display {
                top: 15%; /* 调整顶部位置，适配小屏幕 */
            }
        }

        /* 时间组件容器：控制时间显示的容器 */
        .time-component {
            text-align: center; /* 文本居中对齐 */
            margin-bottom: 2px; /* 底部外边距为2px */
        }

        /* 时间显示：控制具体时间的显示样式 */
        .time {
            font-size: 4.0625rem; /* 字体大小为4.0625rem */
            font-weight: bold; /* 字体粗细为粗体 */
            text-shadow: 0 2px 10px rgba(0,0,0,0.5); /* 文本阴影效果 */
            position: relative; /* 相对定位，作为伪元素的父容器 */
            display: inline-block; /* 内联块级元素 */
            user-select: none; /* 禁止文本选择 */
        }

        /* 五色渐变下划线跑动效果：控制时间显示的下划线动画效果 */
        .time::after {
            content: ''; /* 伪元素内容为空 */
            position: absolute; /* 绝对定位 */
            bottom: 5px; /* 底部距离为5px */
            left: 0; /* 左侧距离为0 */
            width: 0; /* 初始宽度为0 */
            height: 2px; /* 高度为2px */
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff); /* 线性渐变背景 */
            background-size: 500% 100%; /* 背景大小为500%宽度，100%高度 */
            animation: rainbow 3s linear infinite; /* 应用彩虹动画，持续3秒，线性，无限循环 */
            transition: width 0.8s ease; /* 宽度属性的过渡效果，持续0.8秒 */
            will-change: width; /* 告诉浏览器宽度属性将要变化 */
        }

        /* 悬停下划线展开效果：控制时间显示悬停时下划线的展开效果 */
        .time:hover::after {
            width: 100%; /* 悬停时宽度为100% */
        }

        /* 信息行容器：控制日期、星期和农历信息的容器 */
        .info-row {
            display: flex; /* 弹性布局 */
            justify-content: center; /* 水平居中 */
            align-items: center; /* 垂直居中 */
            gap: 20px; /* 子元素间距为20px */
            margin-bottom: 12px; /* 底部外边距为12px */
        }

        /* 日期组件：控制公历日期的显示容器 */
        .date-component,
        /* 星期组件：控制星期几的显示容器 */
        .weekday-component,
        /* 农历组件：控制农历信息的显示容器 */
        .lunar-component {
            font-weight: bold; /* 字体粗细为粗体 */
            text-align: center; /* 文本居中对齐 */
        }

        /* 节假日组件：控制节假日信息的显示容器 */
        .holiday-component {
            font-weight: bold; /* 字体粗细为粗体 */
            text-align: center; /* 文本居中对齐 */
            margin-top: 8px; /* 顶部外边距为8px */
        }

        /* 信息文本：控制日期、星期、农历和节假日信息的文本样式 */
        .date-info,
        .weekday-info,
        .lunar-info,
        .holiday-info {
            font-size: 14px; /* 字体大小为14px */
            font-weight: bold; /* 字体粗细为粗体 */
            text-shadow: 0 2px 5px rgba(0,0,0,0.5); /* 文本阴影效果 */
            position: relative; /* 相对定位，作为伪元素的父容器 */
            user-select: none; /* 禁止文本选择 */
        }

        /* 信息文本下划线效果：控制信息文本的下划线动画效果 */
        .date-info::after,
        .weekday-info::after,
        .lunar-info::after,
        .holiday-info::after {
            content: ''; /* 伪元素内容为空 */
            position: absolute; /* 绝对定位 */
            bottom: -3px; /* 底部距离为-3px */
            left: 0; /* 左侧距离为0 */
            width: 0; /* 初始宽度为0 */
            height: 1px; /* 高度为1px */
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff); /* 线性渐变背景 */
            background-size: 500% 100%; /* 背景大小为500%宽度，100%高度 */
            animation: rainbow 3s linear infinite; /* 应用彩虹动画，持续3秒，线性，无限循环 */
            transition: width 0.8s ease; /* 宽度属性的过渡效果，持续0.8秒 */
            will-change: width; /* 告诉浏览器宽度属性将要变化 */
        }

        /* 信息文本悬停下划线展开效果：控制信息文本悬停时下划线的展开效果 */
        .date-info:hover::after,
        .weekday-info:hover::after,
        .lunar-info:hover::after,
        .holiday-info:hover::after {
            width: 100%; /* 悬停时宽度为100% */
        }

        /* 组件悬停效果：控制节日、时间、日期、星期、农历和节日项目的悬停过渡效果 */
        .holiday-component, .time-component, .date-component, .weekday-component, .lunar-component, .holiday-item {
            transition: all 0.3s ease; /* 所有属性的过渡效果，持续0.3秒 */
        }

        /* 组件悬停缩放效果：控制节日、时间、日期、星期、农历和节日项目的悬停缩放效果 */
        .holiday-component:hover, .time-component:hover, .date-component:hover, .weekday-component:hover, .lunar-component:hover, .holiday-item:hover {
            transform: scale(1.12); /* 悬停时缩放为1.12倍 */
        }

        /* 节日信息容器：控制节日信息的容器 */
        .holidays-container {
            display: flex; /* 弹性布局 */
            justify-content: center; /* 水平居中 */
            align-items: center; /* 垂直居中 */
            gap: 15px; /* 子元素间距为15px */
            flex-wrap: wrap; /* 允许子元素换行 */
            margin-top: 12px; /* 顶部外边距为12px */
        }

        /* 节日项目：控制单个节日信息的容器 */
        .holiday-item {
            text-align: center; /* 文本居中对齐 */
        }

        /* 搜索容器：控制搜索框和搜索按钮的容器 */
        .search-container {
            position: absolute; /* 绝对定位 */
            top: 50%; /* 顶部定位为50% */
            left: 50%; /* 左侧定位为50% */
            transform: translate(-50%, 100px); /* 水平居中，垂直向下移动100px */
            opacity: 0; /* 初始透明度为0，隐藏状态 */
            width: 100%; /* 宽度为100% */
            max-width: 680px; /* 最大宽度为680px */
            border-radius: 25px; /* 圆角为25px */
            transition: all 0.8875s ease; /* 所有属性的过渡效果，持续0.8875秒 */
            will-change: opacity, transform; /* 告诉浏览器这些属性将要变化 */
            z-index: 10; /* 层级为10，高于时间显示容器的z-index:2 */
        }

        /* 搜索容器动画：控制搜索容器的入场动画 */
        .search-container.animate-in {
            transform: translate(-50%, -50%); /* 水平居中，垂直居中 */
            backdrop-filter: blur(10px); /* 背景模糊效果为10px */
            opacity: 1; /* 透明度为1，完全显示 */
        }

        /* 搜索容器浮动效果：控制搜索框聚焦时搜索容器的浮动效果 */
        .search-container.floating {
            transform: translate(-50%, -80px); /* 水平居中，垂直向上移动80px */
        }

        /* 搜索容器浮动时搜索框样式：控制搜索容器浮动时搜索框的样式 */
        .search-container.floating .search-box {
            background: rgba(0,0,0,0.75); /* 背景颜色为半透明黑色 */
            backdrop-filter: blur(10px); /* 背景模糊效果为10px，增强毛玻璃效果 */
        }

        /* 响应式搜索容器：控制小屏幕设备上搜索容器的位置 */
        @media (max-width: 768px) {
            .search-container {
                max-width: 90%; /* 最大宽度为90%，适配小屏幕 */
            }
            
            .search-container.animate-in {
                transform: translate(-50%, -40%); /* 调整垂直位置，适配小屏幕 */
            }
            
            .search-container.floating {
                transform: translate(-50%, -70px); /* 调整浮动位置，适配小屏幕 */
            }
        }

        /* 搜索框：控制搜索输入框的样式 */
        .search-box {
            width: 100%; /* 宽度为100% */
            padding: 10px 43px 10px 43px; /* 内边距：上下13px，左右43px */
            border: none; /* 无边框 */
            outline: none; /* 无轮廓 */
            border-radius: 25px; /* 圆角为25px */
            height: 40px; /* 高度为40px */
            font-size: 16px; /* 字体大小为16px */
            font-family: 'LXGW WenKai', 'Microsoft YaHei', sans-serif; /* 字体为LXGW WenKai，备选为Microsoft YaHei */
            background: rgba(0,0,0,0.5); /* 背景颜色为半透明黑色 */
            backdrop-filter: blur(10px); /* 背景模糊效果为10px */
            transform: translateZ(0); /* 触发硬件加速，提高动画性能 */
            color: white; /* 文本颜色为白色 */
            text-align: center; /* 文本居中对齐 */
            transition: all 0.3s ease; /* 所有属性的过渡效果，持续0.3秒 */
            position: relative; /* 相对定位 */
            z-index: 100; /* 层级为100 */
        }

        /* 搜索框占位符：控制搜索输入框占位符的样式 */
        .search-box::placeholder {
            color: rgba(255,255,255,0.99); /* 占位符颜色为半透明白色 */
            user-select: none; /* 禁止文本选择 */
        }

        /* 搜索相关按钮：控制搜索按钮和引擎按钮的通用样式 */
        .search-related-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            font-size: 14px;
            padding: 10px;
            transition: all 0.3s ease;
            z-index: 101;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 搜索相关按钮悬停效果：控制搜索相关按钮的悬停效果 */
        .search-related-btn:hover {
            background: rgba(0, 0, 0, 0.85); /* 悬停时背景颜色为深半透明黑色 */
        }

        /* 搜索按钮：控制搜索按钮的样式 */
        .search-btn {
            right: 0px; /* 右侧距离为0px */
            border-radius: 50%; /* 圆角为50%，圆形按钮 */
        }

        /* 引擎切换按钮：控制引擎切换按钮的样式 */
        .engine-btn {
            left: 0px;
            border-radius: 25px 0 0 25px;
        }

        /* 搜索下拉容器：控制搜索建议和引擎列表的通用样式 */
        .search-dropdown {
            position: absolute;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            display: none;
            z-index: 99;
        }

        /* 引擎列表容器：控制引擎列表的容器 */
        .engine-list {
            top: 50px;
        }

        /* 引擎列表行：控制引擎列表的行布局 */
        .engine-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        /* 引擎列表项：控制单个引擎选项的样式 */
        .engine-item {
            flex: 1;
            margin: 0 5px;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 引擎列表项悬停效果：控制引擎列表项的悬停效果 */
        .engine-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 引擎列表项图标：控制引擎图标样式 */
        .engine-item img {
            width: 20px;
            height: 20px;
            margin-right: 8px;
        }

        /* 引擎列表项文本：控制引擎文本样式 */
        .engine-item span {
            color: white;
            font-size: 14px;
        }

        /* 搜索建议容器：控制搜索建议的容器 */
        .search-suggestions {
            top: 50px; /* 顶部距离为50px，位于搜索框下方 */
            min-height: 150px; /* 最小高度为150px */
            max-height: 320px; /* 最大高度为320px */
            overflow-y: hidden; /* 垂直溢出隐藏 */
            padding: 0; /* 移除内边距，让搜索建议项直接贴合容器 */
        }

        /* 搜索建议项：控制单个搜索建议的样式 */
        .search-suggestion-item {
            padding: 5px 20px; /* 内边距：上下5px，左右20px */
            transition: all 0.3s ease; /* 所有属性的过渡效果，持续0.3秒 */
            color: white; /* 文本颜色为白色 */
            position: relative; /* 相对定位，作为伪元素的父容器 */
        }

        /* 搜索建议项悬停效果：控制搜索建议项的悬停效果 */
        .search-suggestion-item:hover {
            background: rgba(0, 0, 0, 0.308); /* 悬停时背景颜色为半透明黑色 */
        }

        /* 搜索建议项下划线效果：控制搜索建议项的下划线动画效果 */
        .search-suggestion-item::after {
            content: ''; /* 伪元素内容为空 */
            position: absolute; /* 绝对定位 */
            bottom: 0; /* 底部距离为0 */
            left: 50%; /* 左侧定位为50% */
            transform: translateX(-50%); /* 水平居中 */
            width: 0; /* 初始宽度为0 */
            height: 1px; /* 高度为1px */
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff); /* 线性渐变背景 */
            background-size: 500% 100%; /* 背景大小为500%宽度，100%高度 */
            animation: rainbow 3s linear infinite; /* 应用彩虹动画，持续3秒，线性，无限循环 */
            transition: width 0.8s ease; /* 宽度属性的过渡效果，持续0.8秒 */
        }

        /* 搜索建议项悬停下划线效果：控制搜索建议项悬停时下划线的展开效果 */
        .search-suggestion-item:hover::after {
            width: 100%; /* 悬停时宽度为100% */
        }



        /* 设置窗口：控制设置弹窗的样式 */
        .settings-window {
            position: fixed; /* 固定定位 */
            top: 50%; /* 顶部定位为50% */
            left: 50%; /* 左侧定位为50% */
            transform: translate(-50%, -50%) scale(0) translateZ(0); /* 水平居中，垂直居中，初始缩放为0 */
            opacity: 0; /* 初始透明度为0 */
            border-radius: 20px; /* 圆角为20px */
            background: rgba(0,0,0,0.5); /* 背景颜色为半透明黑色 */
            backdrop-filter: blur(15px); /* 背景模糊效果为15px */
            padding: 30px; /* 内边距为30px */
            width: 90%; /* 宽度为90% */
            max-width: 1000px; /* 最大宽度为1000px */
            z-index: 1000; /* 层级为1000，位于其他元素上方 */
            transition: all 0.3s ease-out; /* 所有属性的过渡效果，持续0.3秒，使用ease-out曲线 */
            color: white; /* 文本颜色为白色 */
            -webkit-font-smoothing: antialiased; /* 使字体在WebKit浏览器中更平滑 */
            -moz-osx-font-smoothing: grayscale; /* 使字体在Firefox on OS X中更平滑 */
            text-rendering: optimizeLegibility; /* 优化文本渲染，提高可读性 */
            user-select: none; /* 禁止文本选择 */
            will-change: transform, opacity; /* 告诉浏览器这些属性将要变化 */
        }

        /* 禁止设置窗口内的文本选择：控制设置窗口内文本的选择行为 */
        .settings-window * {
            user-select: none; /* 禁止文本选择 */
        }

        /* 允许输入框内的文本选择：控制设置窗口内输入框的文本选择行为 */
        .settings-window input[type="text"] {
            user-select: text; /* 允许文本选择 */
        }

        /* 设置窗口激活状态：控制设置窗口的显示动画 */
        .settings-window.active {
            transition: all 0.3s ease-out; /* 所有属性的过渡效果，持续0.3秒，使用ease-out曲线 */
            transform: translate(-50%, -50%) scale(1) translateZ(0); /* 水平居中，垂直居中，缩放为1 */
            opacity: 1; /* 透明度为1，完全显示 */
        }

        /* 设置窗口头部：控制设置窗口头部的样式 */
        .settings-header {
            display: flex; /* 弹性布局 */
            justify-content: space-between; /* 两端对齐 */
            align-items: center; /* 垂直居中 */
            margin-bottom: 30px; /* 底部外边距为30px */
            padding-bottom: 15px; /* 底部内边距为15px */
            border-bottom: 1px solid rgba(255,255,255,0.2); /* 底部边框为1px半透明白色 */
        }

        /* 设置窗口标题：控制设置窗口标题的样式 */
        .settings-title {
            font-size: 1.5rem; /* 字体大小为1.5rem */
            font-weight: bold; /* 字体粗细为粗体 */
        }

        /* 关闭按钮：控制设置窗口关闭按钮的样式 */
        .close-btn {
            background: none; /* 无背景 */
            border: none; /* 无边框 */
            color: white; /* 文本颜色为白色 */
            width: 34px; /* 宽度为34px */
            height: 34px; /* 高度为34px */
            font-size: 24px; /* 字体大小为24px */
            padding: 5px; /* 内边距为5px */
            border-radius: 50%; /* 圆角为50%，圆形按钮 */
            transition: all 0.3s ease; /* 所有属性的过渡效果，持续0.3秒 */
        }

        /* 关闭按钮悬停效果：控制设置窗口关闭按钮的悬停效果 */
        .close-btn:hover {
            background: rgba(255,255,255,0.2); /* 悬停时背景颜色为半透明白色 */
        }

        /* 设置区域：控制设置窗口内各个设置区域的样式 */
        .settings-section {
            margin-bottom: 25px; /* 底部外边距为25px */
        }

        /* 区域标题：控制设置区域标题的样式 */
        .section-title {
            font-size: 1.1rem; /* 字体大小为1.1rem */
            margin-bottom: 15px; /* 底部外边距为15px */
            color: rgba(255,255,255,0.8); /* 文本颜色为半透明白色 */
        }

        /* 选项组：控制设置选项组的样式 */
        .option-group {
            margin-bottom: 15px; /* 底部外边距为15px */
            display: flex; /* 弹性布局 */
            justify-content: space-between; /* 两端对齐 */
            align-items: center; /* 垂直居中 */
        }

        /* 选项标签：控制设置选项标签的样式 */
        .option-label {
            font-size: 0.9rem; /* 字体大小为0.9rem */
        }

        /* 开关按钮：控制设置开关按钮的样式 */
        .toggle-switch {
            position: relative; /* 相对定位，作为开关滑块的父容器 */
            width: 40px; /* 宽度为40px */
            height: 20px; /* 高度为20px */
            cursor: pointer; /* 鼠标指针为手型 */
        }

        /* 开关输入：控制设置开关输入的样式 */
        .toggle-switch input {
            opacity: 0; /* 透明度为0，隐藏原生输入框 */
            width: 0; /* 宽度为0 */
            height: 0; /* 高度为0 */
        }

        /* 开关滑块：控制设置开关滑块的样式 */
        .toggle-slider {
            position: absolute; /* 绝对定位 */
            top: 0; /* 顶部距离为0 */
            left: 0; /* 左侧距离为0 */
            right: 0; /* 右侧距离为0 */
            bottom: 0; /* 底部距离为0 */
            background: linear-gradient(90deg, #589fe0, #7f5cd3); /* 线性渐变背景 */
            transition: all 0.875s linear; /* 所有属性的过渡效果，持续0.875秒 */
            border-radius: 20px; /* 圆角为20px */
        }

        /* 开关滑块指示器：控制设置开关滑块指示器的样式 */
        .toggle-slider:before {
            position: absolute; /* 绝对定位 */
            content: ""; /* 伪元素内容为空 */
            height: 14px; /* 高度为14px */
            width: 14px; /* 宽度为14px */
            left: 3px; /* 左侧距离为3px */
            bottom: 3px; /* 底部距离为3px */
            background-color: white; /* 背景颜色为白色 */
            transition: all 0.08s linear; /* 所有属性的过渡效果，持续0.08秒 */
            border-radius: 50%; /* 圆角为50%，圆形指示器 */
        }

        /* 开关选中状态：控制设置开关选中时的样式 */
        input:checked + .toggle-slider {
            background: linear-gradient(90deg, #ff416c, #333); /* 选中时的线性渐变背景 */
        }

        /* 开关选中指示器位置：控制设置开关选中时指示器的位置 */
        input:checked + .toggle-slider:before {
            transform: translateX(20px); /* 选中时指示器向右移动20px */
        }



        /* 按钮组：控制设置窗口内按钮组的样式 */
        .button-group {
            display: flex; /* 弹性布局 */
            gap: 10px; /* 子元素间距为10px */
            margin-bottom: 15px; /* 底部外边距为15px */
        }

        /* 按钮：控制设置窗口内按钮的样式 */
        .btn {
            flex: 1; /* 弹性伸缩，占满剩余空间 */
            padding: 8px 16px; /* 内边距：上下8px，左右16px */
            border: 1px solid rgba(255,255,255,0.3); /* 边框为1px半透明白色 */
            background: rgba(255,255,255,0.1); /* 背景颜色为半透明白色 */
            color: white; /* 文本颜色为白色 */
            border-radius: 5px; /* 圆角为5px */
            transition: all 0.3s ease; /* 所有属性的过渡效果，持续0.3秒 */
        }

        /* 按钮悬停效果：控制设置窗口内按钮的悬停效果 */
        .btn:hover {
            background: rgba(255,255,255,0.2); /* 悬停时背景颜色为半透明白色 */
        }

        /* 按钮激活状态：控制设置窗口内按钮的激活状态 */
        .btn.active {
            background: rgba(255,255,255,0.3); /* 激活时背景颜色为半透明白色 */
            border-color: white; /* 激活时边框颜色为白色 */
        }

        @media (max-width: 768px) {
            /* 小屏幕时间显示：控制小屏幕设备上时间的显示样式 */
            .time {
                font-size: 2.5rem; /* 字体大小为2.5rem，适配小屏幕 */
            }

            /* 小屏幕信息文本：控制小屏幕设备上信息文本的显示样式 */
            .date-info,
            .weekday-info,
            .lunar-info,
            .holiday-info {
                font-size: 12px; /* 字体大小为12px，适配小屏幕 */
            }

            /* 小屏幕信息行：控制小屏幕设备上信息行的布局 */
            .info-row {
                flex-wrap: wrap; /* 允许信息行换行 */
                gap: 10px; /* 减小子元素间距 */
            }

            /* 小屏幕节日信息容器：控制小屏幕设备上节日信息的布局 */
            .holidays-container {
                gap: 10px; /* 减小子元素间距 */
            }

            /* 小屏幕搜索容器：控制小屏幕设备上搜索容器的样式 */
            .search-container {
                max-width: 90%; /* 最大宽度为90%，适配小屏幕 */
            }
        }

        /* 登录图标容器：控制登录图标的固定定位 */
        .login-icon-container {
            position: fixed; /* 固定定位 */
            bottom: 80px; /* 距离底部72px，在设置图标上方20px */
            right: 35px; /* 距离右侧35px */
            z-index: 102; /* 层级为102，确保显示在搜索框和时间信息上方 */
            width: 32px; /* 宽度为32px */
            height: 32px; /* 高度为32px */
            user-select: none; /* 禁止文本选择 */
        }
        
        /* 登录图标：控制登录图标的样式 */
        .login-icon {
            width: 100%; /* 宽度为100% */
            height: 100%; /* 高度为100% */
        }
        
        /* 登录图标图片：控制登录图标图片的样式 */
        .login-icon img {
            width: 100%; /* 宽度为100% */
            height: 100%; /* 高度为100% */
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0)); /* 图片阴影效果 */
        }
        
        /* 设置图标容器：控制设置图标的固定定位 */
        .gear-icon-container {
            position: fixed; /* 固定定位 */
            bottom: 35px; /* 距离底部35px */
            right: 35px; /* 距离右侧35px */
            z-index: 102; /* 层级为102，确保显示在搜索框和时间信息上方 */
            width: 32px; /* 宽度为32px */
            height: 32px; /* 高度为32px */
            user-select: none; /* 禁止文本选择 */
        }
        
        /* 登录页面容器：控制登录页面的显示和隐藏 */
        .login-page-container {
            position: fixed; /* 固定定位 */
            top: 0; /* 顶部定位为0 */
            left: 0; /* 左侧定位为0 */
            width: 100%; /* 宽度为100% */
            height: 100%; /* 高度为100% */
            z-index: 2000; /* 层级为2000，确保显示在所有元素上方 */

            background: white; /* 背景颜色为白色 */

        /* 设置图标：控制设置图标的旋转效果 */
        .gear-icon {
            width: 100%; /* 宽度为100% */

            transform-origin: center center; /* 旋转原点为中心 */
        }
        
        /* 设置图标图片：控制设置图标图片的样式 */
        .gear-icon img {
            width: 100%; /* 宽度为100% */
            height: 100%; /* 高度为100% */
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0)); /* 图片阴影效果 */

        /* 旋转动画：控制设置图标的旋转动画 */
        @keyframes rotate {
            from { transform: rotate(0deg); } /* 动画开始时旋转0度 */
            to { transform: rotate(720deg); } /* 动画结束时旋转720度 */

<!-- body 标签：整个页面的主体容器，包含所有可见内容 -->
<body>
    <!-- 背景容器：用于显示页面背景图片 -->
    <div class="background-container" id="backgroundContainer">
        <img src="" alt="背景"> <!-- 背景图片，初始为空，通过JavaScript设置 -->
    </div>

    <!-- 主容器：包含时间显示和搜索功能的主要内容区域 -->
    <div class="main-container">
        <!-- 时间显示：显示当前时间、日期和农历信息 -->
        <div class="time-display" id="timeDisplay">
            <!-- 时间组件：显示具体时间 -->
            <div class="time-component">
                    <div class="time clickable" id="currentTime"></div>
                </div>
            <!-- 信息行：显示日期、星期和农历信息 -->
            <div class="info-row">
                <!-- 日期组件：显示公历日期 -->
                <div class="date-component">
                    <span class="date-info clickable" id="dateInfo"></span>
                </div>
                <!-- 星期组件：显示星期几 -->
                <div class="weekday-component">
                    <span class="weekday-info clickable" id="weekdayInfo"></span>
                </div>
                <!-- 农历组件：显示农历信息 -->
                <div class="lunar-component">
                    <span class="lunar-info clickable" id="lunarInfo"></span>
                </div>
            </div>
            <!-- 节日信息容器：显示节日相关信息 -->
            <div class="holidays-container">
                <!-- 上一个节日 -->
                <div class="holiday-item">
                    <span class="holiday-info clickable" id="lastHolidayInfo"></span> <!-- 上一个节日信息显示 -->
                </div>
                <!-- 今日节日 -->
                <div class="holiday-item">
                    <span class="holiday-info clickable" id="holidayInfo"></span> <!-- 节假日信息显示 -->
                </div>
                <!-- 下一个节日 -->
                <div class="holiday-item">
                    <span class="holiday-info clickable" id="nextHolidayInfo"></span> <!-- 下一个节日信息显示 -->
                </div>
            </div>
        </div>

        <!-- 搜索容器：包含搜索框和搜索按钮 -->
        <div class="search-container">
            <button class="engine-btn search-related-btn clickable" id="engineBtn">
                <img src="https://img.icons8.com/color/48/000000/bing.png" alt="必应" width="20" height="20">
            </button> <!-- 引擎切换按钮 -->
            <input type="text" class="search-box" id="searchBox" placeholder="搜点什么吧" autocomplete="off"> <!-- 搜索输入框 -->
            <button class="search-btn search-related-btn clickable" id="searchBtn">🪶</button> <!-- 搜索按钮 -->
            <div class="search-suggestions search-dropdown" id="searchSuggestions"></div> <!-- 搜索建议容器 -->
            <div class="engine-list search-dropdown" id="engineList"></div> <!-- 引擎列表容器 -->
        </div>
    </div>

    <!-- 设置窗口：包含各种设置选项的弹窗 -->
    <div class="settings-window" id="settingsWindow">
        <!-- 设置窗口头部：包含标题和关闭按钮 -->
        <div class="settings-header">
            <h2 class="settings-title">设置</h2>
            <button class="close-btn clickable" id="closeBtn">×</button> <!-- 关闭按钮 -->
        </div>

        <!-- 设置区域：壁纸设置 -->
        <div class="settings-section"> <!-- div 是容器元素，用于组织和布局设置选项 -->
            <h3 class="section-title">壁纸</h3>
            <!-- 按钮组：选择壁纸类型 -->
            <div class="button-group">
                <button class="btn clickable" data-wallpaper="daily">每日必应</button> <!-- 每日必应壁纸选项 -->
                <button class="btn active clickable" data-wallpaper="random">随机封面</button> <!-- 随机壁纸选项 -->
                <button class="btn clickable" data-wallpaper="website">网站背景</button> <!-- 固定网站背景选项 -->
                <button class="btn clickable" data-wallpaper="custom">自定义壁纸</button> <!-- 自定义壁纸选项 -->
            </div>
            <!-- 自定义壁纸URL输入区域 -->
            <div class="option-group" id="customWallpaperSection" style="display: none;">
                <span class="option-label">自定义壁纸URL</span>
                <input type="text" id="customWallpaperUrl" value="https://uapis.cn/api/v1/random/image" placeholder="输入壁纸图片URL" style="flex: 1; padding: 8px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; border-radius: 5px; margin-left: 10px;"> <!-- 自定义壁纸URL输入框，可修改默认值 -->
            </div>
        </div>

        <!-- 设置区域：外观设置 -->
        <div class="settings-section"> <!-- div 是容器元素，用于组织和布局设置选项 -->
            <h3 class="section-title">外观</h3>
            <!-- 选项组：壁纸遮罩开关 -->
            <div class="option-group">
                <span class="option-label">壁纸遮罩</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="maskToggle"> <!-- 壁纸遮罩开关，默认关闭 -->
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>

        <!-- 设置区域：搜索设置 -->
        <div class="settings-section"> <!-- div 是容器元素，用于组织和布局设置选项 -->
            <h3 class="section-title">搜索</h3>
            <!-- 选项组：搜索建议开关 -->
            <div class="option-group">
                <span class="option-label">搜索建议</span>
                <label class="toggle-switch">
                    <input type="checkbox" checked id="suggestToggle"> <!-- 搜索建议开关，默认开启 -->
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <!-- 选项组：新标签页打开开关 -->
            <div class="option-group">
                <span class="option-label">新标签页打开</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="newTabToggle"> <!-- 新标签页打开开关，默认关闭 -->
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>

        <!-- 设置区域：时间设置 -->
        <div class="settings-section"> <!-- div 是容器元素，用于组织和布局设置选项 -->
            <h3 class="section-title">时间</h3>
            <!-- 选项组：时间显秒开关 -->
            <div class="option-group">
                <span class="option-label">时间显秒</span>
                <label class="toggle-switch">
                    <input type="checkbox" checked id="secondsToggle"> <!-- 时间显秒开关，默认开启 -->
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <!-- 选项组：显示农历开关 -->
            <div class="option-group">
                <span class="option-label">显示农历</span>
                <label class="toggle-switch">
                    <input type="checkbox" checked id="lunarToggle"> <!-- 显示农历开关，默认开启 -->
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <!-- 选项组：12小时制开关 -->
            <div class="option-group">
                <span class="option-label">12小时制</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="12HourToggle"> <!-- 12小时制开关，默认关闭 -->
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let wallpaperType = 'random'; // 壁纸类型，可自定义修改默认值（daily/random/website/custom）
        let customWallpaperUrl = ''; // 自定义壁纸URL，可在设置中修改
        let enableMask = false; // 是否启用壁纸遮罩
        let isSearchFocused = false; // 搜索框是否聚焦
        let lastLunarDate = ''; // 上次获取农历信息的日期
        let lunarData = null; // 农历信息缓存

        // 保存设置到localStorage

            try {
                const settings = {
                    wallpaperType, // 壁纸类型设置
                    customWallpaperUrl, // 自定义壁纸URL设置
                    enableMask, // 壁纸遮罩设置

                console.log('设置保存成功');
            } catch (error) {
                console.error('保存设置失败:', error);
            }
        }

        // 从localStorage加载设置
        function loadSettings() {
            try {
                const savedSettings = localStorage.getItem('homePageSettings');
                if (savedSettings) {
                    const settings = JSON.parse(savedSettings);
                    wallpaperType = settings.wallpaperType || 'random'; // 加载壁纸类型设置
                    customWallpaperUrl = settings.customWallpaperUrl || ''; // 加载自定义壁纸URL设置
                    enableMask = settings.enableMask || false; // 加载壁纸遮罩设置
                    showSeconds = settings.showSeconds !== false; // 加载显示秒数设置
                    showLunar = settings.showLunar !== false; // 加载显示农历设置
                    is12Hour = settings.is12Hour || false; // 加载12小时制设置

                    // 更新UI控件
                    const customWallpaperUrlInput = document.getElementById('customWallpaperUrl');
                    const maskToggle = document.getElementById('maskToggle');
                    const suggestToggle = document.getElementById('suggestToggle');
                    const newTabToggle = document.getElementById('newTabToggle');
                    const secondsToggle = document.getElementById('secondsToggle');
                    const lunarToggle = document.getElementById('lunarToggle');
                    const hourToggle = document.getElementById('12HourToggle');

                    if (customWallpaperUrlInput) customWallpaperUrlInput.value = customWallpaperUrl; // 更新自定义壁纸URL设置
                    if (maskToggle) maskToggle.checked = enableMask; // 更新壁纸遮罩设置
                    if (suggestToggle) suggestToggle.checked = settings.suggestToggle !== false; // 更新搜索建议设置
                    if (newTabToggle) newTabToggle.checked = settings.newTabToggle || false; // 更新新标签页打开设置
                    if (secondsToggle) secondsToggle.checked = showSeconds; // 更新显示秒数设置
                    if (lunarToggle) lunarToggle.checked = showLunar; // 更新显示农历设置
                    if (hourToggle) hourToggle.checked = is12Hour; // 更新12小时制设置

                    // 更新壁纸类型按钮状态
                    const wallpaperBtns = document.querySelectorAll('.btn[data-wallpaper]');
                    if (wallpaperBtns) {
                        wallpaperBtns.forEach(btn => {
                            if (btn.dataset.wallpaper === wallpaperType) {
                                btn.classList.add('active');
                            } else {
                                btn.classList.remove('active');
                            }
                        });
                    }

                    // 显示/隐藏自定义壁纸输入框
                    const customWallpaperSection = document.getElementById('customWallpaperSection');
                    if (customWallpaperSection) {
                        customWallpaperSection.style.display = wallpaperType === 'custom' ? 'flex' : 'none';
                    }

                    // 加载当前搜索引擎设置
                    if (settings.currentEngine) {
                        currentEngine = settings.currentEngine;
                        // 更新引擎按钮图标
                        const engineBtn = document.getElementById('engineBtn');
                        if (engineBtn) {
                            engineBtn.innerHTML = `<img src="${currentEngine.icon}" alt="${currentEngine.name}" width="20" height="20">`;

                    // 应用壁纸遮罩设置
                    updateWallpaperEffects();

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initializePage(); // 初始化页面
            updateTime(); // 更新时间
            // 使用变量存储定时器ID，以便在需要时清除
            window.updateTimeInterval = setInterval(updateTime, 1000); // 每秒更新时间
            
            // 添加ESC键支持
            document.addEventListener('keydown', function(e) {

                    const searchBox = document.getElementById('searchBox');
                    searchBox.blur();
                    
                    // 关闭引擎列表
                    const engineList = document.getElementById('engineList');
                    engineList.style.display = 'none';

        // 从缓存中获取壁纸
        function getWallpaperFromCache(key) {
            try {
                const cache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
                return cache[key];
            } catch (error) {
                console.error('从缓存获取壁纸失败:', error);
                return null;
            }
        }

        // 将壁纸添加到缓存
        function addWallpaperToCache(key, url) {
            try {
                const cache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
                
                // 将新项添加到缓存开头
                cache[key] = url;
                
                // 限制缓存大小
                const keys = Object.keys(cache);
                if (keys.length > MAX_CACHE_SIZE) {
                    // 删除最旧的缓存项
                    const oldestKey = keys[0];
                    delete cache[oldestKey];
                }
                
                localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
            } catch (error) {
                console.error('添加壁纸到缓存失败:', error);
            }
        }

        // 动态预加载壁纸资源
        function preloadWallpaperResource() {
            // 移除之前的预加载链接
            document.querySelectorAll('link[data-preload="wallpaper"]').forEach(link => link.remove());

            // 根据壁纸类型确定URL
            let url = '';
            switch(wallpaperType) {
                case 'daily': url = `https://uapis.cn/api/v1/image/bing-daily`; break;
                case 'random': url = `https://wp.upx8.com/api.php`; break;
                case 'website': url = `http://cdn-hsyq-static.shanhutech.cn/bizhi/staticwp/202408/aa5f5cb60290872203fcd14dfa10e9d5--2308701055.jpg`; break;
                case 'custom': url = customWallpaperUrl || `https://uapis.cn/api/v1/random/image`; break;
                default: url = `https://wp.upx8.com/api.php`;
            }

            // 创建预加载链接
            if (url) {
                const link = document.createElement('link');
                link.rel = 'preload';
                link.href = url;
                link.as = 'image';
                link.setAttribute('data-preload', 'wallpaper');
                document.head.appendChild(link);
            }
        }

        // 初始化页面
        function initializePage() {
            // 背景加载动画
            const backgroundContainer = document.getElementById('backgroundContainer');
            const backgroundImg = backgroundContainer.querySelector('img');

            // 定义图片加载完成后的处理函数
            function handleImageLoad() {
                // 添加loaded类，触发背景动画
                backgroundContainer.classList.add('loaded');
                // 触发时间显示的动画
                setTimeout(() => {
                    const timeDisplay = document.getElementById('timeDisplay');
                    timeDisplay.classList.add('animate-in');
                    // 触发搜索容器的动画
                    setTimeout(() => {
                        const searchContainer = document.querySelector('.search-container');
                        searchContainer.classList.add('animate-in');
                    }, 50);
                }, 180);
            }

            // 加载保存的设置
            loadSettings();

            // 动态预加载当前壁纸资源
            preloadWallpaperResource();

            // 图片加载完成后开始动画
            backgroundImg.onload = handleImageLoad;

            // 立即设置背景图片，避免默认随机壁纸API的请求被取消
            updateWallpaper();

            // 如果图片已经加载完成（缓存），直接触发动画
            setTimeout(() => {
                if (backgroundImg.complete) {
                    handleImageLoad();
                }
            }, 100);

            // 搜索框交互
            const searchBox = document.getElementById('searchBox');
            const searchBtn = document.getElementById('searchBtn');
            const engineBtn = document.getElementById('engineBtn');
            const engineList = document.getElementById('engineList');
            const background = document.getElementById('backgroundContainer');
            const searchSuggestions = document.getElementById('searchSuggestions');
            const suggestToggle = document.getElementById('suggestToggle');
            
            // 初始化引擎列表
            function initEngineList() {
                engineList.innerHTML = '';
                
                // 每4个引擎一行
                for (let i = 0; i < searchEngines.length; i += 4) {
                    const row = document.createElement('div');
                    row.className = 'engine-row';
                    
                    for (let j = i; j < i + 4 && j < searchEngines.length; j++) {
                        const engine = searchEngines[j];
                        const engineItem = document.createElement('div');
                        engineItem.className = 'engine-item clickable';
                        engineItem.innerHTML = `
                            <img src="${engine.icon}" alt="${engine.name}">
                            <span>${engine.name}</span>
                        `;
                        
                        // 添加点击事件
                        engineItem.addEventListener('click', function() {
                            currentEngine = engine;
                            engineBtn.innerHTML = `<img src="${engine.icon}" alt="${engine.name}" width="20" height="20">`;
                            engineList.style.display = 'none';
                            searchBox.focus(); // 自动定位光标到搜索框
                            saveSettings(); // 保存设置，确保刷新后仍保持选中的引擎
                            // 保持搜索框的悬浮效果
                            if (!isSearchFocused) {
                                isSearchFocused = true;
                                background.classList.add('zoom-in', 'blur'); // 背景缩放和模糊效果
                                // 时间显示悬浮效果
                                const timeDisplay = document.querySelector('.time-display');
                                timeDisplay.style.zIndex = '1';
                                timeDisplay.classList.add('floating');
                                // 搜索框悬浮效果
                                const searchContainer = document.querySelector('.search-container');
                                searchContainer.classList.add('floating');
                            }
                        });
                        
                        row.appendChild(engineItem);
                    }
                    
                    engineList.appendChild(row);
                }
            }
            
            // 初始化引擎列表
            initEngineList();
            
            // 引擎切换按钮点击事件
            engineBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                
                // 确保显示搜索框悬浮效果
                if (!isSearchFocused) {
                    isSearchFocused = true;
                    background.classList.add('zoom-in', 'blur'); // 背景缩放和模糊效果
                    // 时间显示悬浮效果
                    const timeDisplay = document.querySelector('.time-display');
                    timeDisplay.style.zIndex = '1';
                    timeDisplay.classList.add('floating');
                    // 搜索框悬浮效果
                    const searchContainer = document.querySelector('.search-container');
                    searchContainer.classList.add('floating');
                }
                
                // 切换引擎列表显示/隐藏
                if (engineList.style.display === 'block') {
                    engineList.style.display = 'none';
                } else {
                    engineList.style.display = 'block';
                    searchSuggestions.style.display = 'none'; // 隐藏搜索建议
                }
            });
            
            // 点击外部区域关闭引擎列表
            document.addEventListener('click', function(e) {
                if (!engineBtn.contains(e.target) && !engineList.contains(e.target) && !searchBox.contains(e.target) && !searchBtn.contains(e.target)) {
                    engineList.style.display = 'none';
                    // 如果搜索框没有焦点，恢复到默认状态
                    if (isSearchFocused && document.activeElement !== searchBox) {
                        isSearchFocused = false;
                        // 检查设置窗口是否打开
                        const settingsWindow = document.getElementById('settingsWindow');
                        if (!settingsWindow.classList.contains('active')) {
                            background.classList.remove('zoom-in'); // 恢复背景缩放
                            background.classList.remove('blur'); // 移除背景模糊效果
                        } else {
                            // 设置窗口打开时，保留设置窗口的背景效果，移除搜索框的背景效果
                            background.classList.remove('zoom-in'); // 移除搜索框的缩放效果
                        }
                        // 恢复时间显示
                        const timeDisplay = document.querySelector('.time-display');
                        timeDisplay.style.zIndex = '2';
                        timeDisplay.classList.remove('floating');
                        // 恢复搜索框
                        const searchContainer = document.querySelector('.search-container');
                        searchContainer.classList.remove('floating');
                        searchContainer.style.background = 'none'; // 清除搜索容器背景
                        // 立即隐藏搜索建议，避免过渡效果
                        searchSuggestions.style.display = 'none';
                    }
                }
            });

            searchBox.addEventListener('focus', function() {
                // 关闭引擎列表
                const engineList = document.getElementById('engineList');
                engineList.style.display = 'none';
                
                if (!isSearchFocused) {
                    isSearchFocused = true;
                    background.classList.add('zoom-in', 'blur'); // 背景缩放和模糊效果
                    // 时间显示悬浮效果
                    const timeDisplay = document.querySelector('.time-display');
                    timeDisplay.style.zIndex = '1';
                    timeDisplay.classList.add('floating');
                    // 搜索框悬浮效果
                    const searchContainer = document.querySelector('.search-container');
                    searchContainer.classList.add('floating');
                }
                // 当编辑框有文字时，自动显示搜索建议
                const query = this.value.trim();
                if (query.length > 1 && suggestToggle.checked) {
                    fetchSearchSuggestions(query);
                }
            });

            searchBox.addEventListener('blur', function() {
                // 检查是否真的失去焦点，而不是窗口切换
                setTimeout(() => {
                    // 检查是否点击了引擎按钮或引擎列表
                    const engineBtn = document.getElementById('engineBtn');
                    const engineList = document.getElementById('engineList');
                    if (!document.activeElement || (document.activeElement !== searchBox && !engineBtn.contains(document.activeElement) && !engineList.contains(document.activeElement))) {
                        isSearchFocused = false;
                        // 检查设置窗口是否打开
                        const settingsWindow = document.getElementById('settingsWindow');
                        if (!settingsWindow.classList.contains('active')) {
                            background.classList.remove('zoom-in'); // 恢复背景缩放
                            background.classList.remove('blur'); // 移除背景模糊效果
                        } else {
                            // 设置窗口打开时，保留设置窗口的背景效果，移除搜索框的背景效果
                            background.classList.remove('zoom-in'); // 移除搜索框的缩放效果
                            console.log('设置窗口打开，保留设置窗口的背景效果');
                        }
                        // 恢复时间显示
                        const timeDisplay = document.querySelector('.time-display');
                        timeDisplay.style.zIndex = '2';
                        timeDisplay.classList.remove('floating');
                        // 恢复搜索框
                        const searchContainer = document.querySelector('.search-container');
                        searchContainer.classList.remove('floating');
                        searchContainer.style.background = 'none'; // 清除搜索容器背景
                        // 立即隐藏搜索建议，避免过渡效果
                        searchSuggestions.style.display = 'none';
                    }
                }, 100);
            });

            searchBtn.addEventListener('click', function() {
                performSearch(); // 执行搜索
            });

            searchBox.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    performSearch(); // 回车执行搜索
                }
            });

            // 搜索建议功能
            searchBox.addEventListener('input', function() {
                // 关闭引擎列表
                const engineList = document.getElementById('engineList');
                engineList.style.display = 'none';
                
                const query = this.value.trim();
                if (query.length > 1 && suggestToggle.checked) {
                    fetchSearchSuggestions(query); // 获取搜索建议
                } else {
                    searchSuggestions.style.display = 'none'; // 隐藏搜索建议
                }
            });

            // 处理搜索建议点击
            searchSuggestions.addEventListener('click', function(e) {
                if (e.target.classList.contains('search-suggestion-item')) {
                    searchBox.value = e.target.textContent; // 设置搜索框值
                    searchSuggestions.style.display = 'none'; // 隐藏搜索建议
                    performSearch(); // 执行搜索

            // 时间显示点击事件 - 跳转到国家授时中心标准北京时间网站
            const timeElement = document.querySelector('.time');

            // 移除其他时间信息的点击事件，不再跳转到设置

        // 设置控制
        function setupSettingsControls() {
            // 壁纸类型
            const wallpaperBtns = document.querySelectorAll('.btn[data-wallpaper]');
            const customWallpaperSection = document.getElementById('customWallpaperSection');
            const customWallpaperUrlInput = document.getElementById('customWallpaperUrl');

            wallpaperBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    wallpaperBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    wallpaperType = this.dataset.wallpaper; // 更新壁纸类型

                    // 显示/隐藏自定义壁纸输入框
                    if (customWallpaperSection) {
                        customWallpaperSection.style.display = wallpaperType === 'custom' ? 'flex' : 'none';
                    }

                    // 当选择自定义壁纸时，获取输入框的值
                    if (wallpaperType === 'custom' && customWallpaperUrlInput) {
                        const inputValue = customWallpaperUrlInput.value.trim();
                        if (!inputValue) {
                            // 如果输入框为空，恢复默认URL
                            const defaultUrl = 'https://uapis.cn/api/v1/random/image'; // 默认自定义壁纸URL，可自定义修改
                            customWallpaperUrlInput.value = defaultUrl;
                            customWallpaperUrl = defaultUrl;
                        } else {
                            customWallpaperUrl = inputValue;
                        }
                    }

                    // 动态预加载新的壁纸资源
                    preloadWallpaperResource();
                    
                    updateWallpaper(); // 更新壁纸
                    saveSettings(); // 保存设置
                });
            });

            // 自定义壁纸URL输入框事件
            if (customWallpaperUrlInput) {
                customWallpaperUrlInput.addEventListener('change', function() {
                    const inputValue = this.value.trim();
                    customWallpaperUrl = inputValue; // 更新自定义壁纸URL
                    if (wallpaperType === 'custom' && inputValue) {
                        // 动态预加载新的自定义壁纸资源
                        preloadWallpaperResource();
                        updateWallpaper(); // 更新壁纸
                    }
                    saveSettings(); // 保存设置
                });

                customWallpaperUrlInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        const inputValue = this.value.trim();
                        customWallpaperUrl = inputValue; // 更新自定义壁纸URL
                        if (wallpaperType === 'custom' && inputValue) {
                            // 动态预加载新的自定义壁纸资源
                            preloadWallpaperResource();
                            updateWallpaper(); // 更新壁纸
                        }
                        saveSettings(); // 保存设置
                    }
                });
            }

            // 外观设置
            const maskToggle = document.getElementById('maskToggle');
            if (maskToggle) {
                maskToggle.addEventListener('change', function() {
                    enableMask = this.checked; // 更新壁纸遮罩设置
                    updateWallpaperEffects(); // 更新壁纸效果
                    saveSettings(); // 保存设置
                });
            }

            // 搜索设置
            const suggestToggle = document.getElementById('suggestToggle');
            if (suggestToggle) {
                suggestToggle.addEventListener('change', function() {
                    saveSettings(); // 保存设置
                });
            }

            const newTabToggle = document.getElementById('newTabToggle');
            if (newTabToggle) {
                newTabToggle.addEventListener('change', function() {
                    saveSettings(); // 保存设置
                });
            }

            // 时间设置

            if (secondsToggle) {
                secondsToggle.addEventListener('change', function() {
                    showSeconds = this.checked; // 更新显示秒数设置
                    updateTime(); // 更新时间
                    saveSettings(); // 保存设置
                });
            }

            const lunarToggle = document.getElementById('lunarToggle');
            if (lunarToggle) {
                lunarToggle.addEventListener('change', function() {
                    showLunar = this.checked; // 更新显示农历设置
                    updateTime(); // 更新时间
                    saveSettings(); // 保存设置
                });
            }

            const hourToggle = document.getElementById('12HourToggle');
            if (hourToggle) {

                    is12Hour = this.checked; // 更新12小时制设置
                    updateTime(); // 更新时间
                    saveSettings(); // 保存设置
                });

        // 更新壁纸
        function updateWallpaper() {
            const img = document.querySelector('.background-container img');
            let url = '';

            // 生成缓存键
            let cacheKey = wallpaperType;
            if (wallpaperType === 'custom' && customWallpaperUrl) {
                cacheKey = `custom_${customWallpaperUrl}`;
            }

            // 尝试从缓存获取
            const cachedUrl = getWallpaperFromCache(cacheKey);
            if (cachedUrl) {
                console.log('使用缓存的壁纸:', cachedUrl);
                img.src = cachedUrl;
                return;
            }

            // 缓存中没有，生成新URL
            switch(wallpaperType) {
                case 'daily':
                    url = `https://uapis.cn/api/v1/image/bing-daily`; // 每日必应壁纸API，可自定义修改
                    break;
                case 'random':
                    url = `https://wp.upx8.com/api.php`; // 随机壁纸API，可自定义修改
                    break;
                case 'website':
                    url = `http://cdn-hsyq-static.shanhutech.cn/bizhi/staticwp/202408/aa5f5cb60290872203fcd14dfa10e9d5--2308701055.jpg`; // 固定网站背景，可自定义修改
                    break;
                case 'custom':
                    url = customWallpaperUrl || `https://wp.upx8.com/api.php`; // 自定义壁纸URL
                    break;
                default:
                    url = `https://wp.upx8.com/api.php`; // 默认随机壁纸
            }

            // 加载新壁纸
            img.src = url;

            // 监听图片加载完成后添加到缓存
            const originalOnLoad = img.onload;
            img.onload = function() {
                // 执行原始的onload处理程序
                if (originalOnLoad) {
                    originalOnLoad.call(this);
                }
                // 添加到缓存
                addWallpaperToCache(cacheKey, url);
            };
        }

        // 执行搜索
        function performSearch() {
            const searchBox = document.getElementById('searchBox');
            const query = searchBox.value.trim();
            if (query) {
                const newTabToggle = document.getElementById('newTabToggle');
                const url = currentEngine.url + encodeURIComponent(query); // 使用当前选中的搜索引擎
                if (newTabToggle.checked) {
                    window.open(url, '_blank'); // 新标签页打开
                } else {
                    window.location.href = url; // 当前页面打开
                }
            }
        }

        // 获取搜索建议
        function fetchSearchSuggestions(query) {
            const searchSuggestions = document.getElementById('searchSuggestions');
            const searchBox = document.getElementById('searchBox');

            // 清除旧的建议
            searchSuggestions.innerHTML = '';

            // 使用唯一的回调函数名称，避免多个请求之间的冲突
            const callbackName = 'baidu_sug_' + Date.now();
            
            // 使用百度搜索建议API，可自定义修改为其他搜索建议API
            const script = document.createElement('script');

            // 定义回调函数
            window[callbackName] = function(data) {
                if (data && data.s) {
                    const suggestions = data.s;
                    if (suggestions.length > 0) {
                        // 显示搜索建议
                        searchSuggestions.style.display = 'block';
                        // 将搜索框的下圆角改为0
                        searchBox.style.borderRadius = '25px';

                        // 添加建议项
                        suggestions.forEach(suggestion => {
                            const item = document.createElement('div');
                            item.className = 'search-suggestion-item clickable';
                            item.textContent = suggestion;
                            searchSuggestions.appendChild(item);
                        });
                    } else {
                        searchSuggestions.style.display = 'none';
                        // 恢复搜索框的圆角
                        searchBox.style.borderRadius = '25px';
                    }
                } else {
                    searchSuggestions.style.display = 'none';
                    // 恢复搜索框的圆角
                    searchBox.style.borderRadius = '25px';
                }
                // 清理
                if (document.head.contains(script)) {
                    document.head.removeChild(script);
                }
                // 清理全局回调对象，避免内存泄漏
                if (window[callbackName]) {
                    delete window[callbackName];
                }
            };

            // 构建API URL
            const apiUrl = `https://suggestion.baidu.com/su?wd=${encodeURIComponent(query)}&cb=${callbackName}`; // 百度搜索建议API，可自定义修改
            script.src = apiUrl;
            document.head.appendChild(script);
        }

        // 打开设置
        function openSettings() {
            const settingsWindow = document.getElementById('settingsWindow');
            const background = document.getElementById('backgroundContainer');
            settingsWindow.classList.add('active'); // 显示设置窗口
            background.classList.add('blur'); // 添加背景模糊效果
            background.classList.add('settings-zoom'); // 添加背景缩放效果
        }

        // 关闭设置
        function closeSettings() {
            const settingsWindow = document.getElementById('settingsWindow');
            const background = document.getElementById('backgroundContainer');
            settingsWindow.classList.remove('active'); // 隐藏设置窗口
            background.classList.remove('blur'); // 移除背景模糊效果
            background.classList.remove('settings-zoom'); // 移除背景缩放效果
        }

        // 点击外部区域关闭设置窗口
        function setupClickOutsideListener() {
            let mouseDownTarget = null;
            
            // 监听鼠标按下事件，记录目标元素
            document.addEventListener('mousedown', function(event) {
                mouseDownTarget = event.target;
            });
            
            // 监听鼠标释放事件，检查是否需要关闭窗口
            document.addEventListener('mouseup', function(event) {
                const settingsWindow = document.getElementById('settingsWindow');
                const timeDisplay = document.getElementById('timeDisplay');
                
                // 检查设置窗口是否打开
                if (settingsWindow.classList.contains('active')) {
                    // 检查鼠标按下和释放的目标是否相同
                    // 这样可以避免在拖动文本时关闭窗口
                    if (event.target === mouseDownTarget) {
                        // 检查点击目标是否在设置窗口内部
                        const isClickInsideSettings = settingsWindow.contains(event.target);
                        // 检查点击目标是否是时间显示（打开设置的按钮）
                        const isClickOnTimeDisplay = timeDisplay.contains(event.target);
                        
                        // 如果点击的是外部区域，关闭设置窗口
                        if (!isClickInsideSettings && !isClickOnTimeDisplay) {
                            closeSettings();
                        }
                    }
                }
            });
        }
        
        // 切换登录页面的显示和隐藏
        function toggleLoginPage() {
            const loginPageContainer = document.getElementById('loginPageContainer');
            if (loginPageContainer.style.display === 'none' || loginPageContainer.style.display === '') {
                // 显示登录页面
                loginPageContainer.style.display = 'block';
            } else {
                // 隐藏登录页面
                loginPageContainer.style.display = 'none';
            }
        }

        // 更新壁纸效果
        function updateWallpaperEffects() {
            const backgroundContainer = document.getElementById('backgroundContainer');
            if (backgroundContainer) {
                // 应用遮罩效果
                if (enableMask) {
                    backgroundContainer.classList.add('mask');
                } else {
                    backgroundContainer.classList.remove('mask');
                }
            }
        }

        // 获取农历和节假日信息
        async function getLunarAndHoliday() {
            const now = new Date();
            // 确保日期格式为 YYYY-MM-DD
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const dateStr = `${year}-${month}-${day}`;

            // 检查是否已经获取了当天的农历信息
            if (lastLunarDate === dateStr && lunarData) {
                return lunarData; // 返回缓存的农历信息
            }

            try {
                const response = await fetch(`https://uapis.cn/api/v1/misc/holiday-calendar?date=${dateStr}&holiday_type=all&include_nearby=true&nearby_limit=365&timezone=Asia/Shanghai`); // 农历和节假日API，可自定义修改

                if (!response.ok) {
                    throw new Error(`API请求失败: ${response.status}`);
                }

                const data = await response.json();

                if (data.days && data.days.length > 0) {
                    const dayData = data.days[0];
                    const lunarInfo = `${dayData.ganzhi_year}年${dayData.lunar_month_name}${dayData.lunar_day_name}`; // 农历信息格式

                    let holidayInfo = '';
                    if (data.holidays && data.holidays.length > 0) {
                        holidayInfo = data.holidays[0].name; // 节假日信息
                    }

                    // 处理上一个节日
                    let lastHoliday = '';
                    if (data.nearby && data.nearby.previous && data.nearby.previous.length > 0) {
                        // 找到最近的节日
                        for (const item of data.nearby.previous) {
                            if (item.events && item.events.length > 0) {
                                // 提取月-日格式
                                const dateParts = item.date.split('-');
                                const monthDay = `${dateParts[1]}-${dateParts[2]}`;
                                lastHoliday = `${item.events[0].name} (${monthDay})`;
                                break;
                            }
                        }
                    }

                    // 处理下一个节日
                    let nextHoliday = '';
                    if (data.nearby && data.nearby.next && data.nearby.next.length > 0) {
                        // 找到最近的节日
                        for (const item of data.nearby.next) {
                            if (item.events && item.events.length > 0) {
                                // 提取月-日格式
                                const dateParts = item.date.split('-');
                                const monthDay = `${dateParts[1]}-${dateParts[2]}`;
                                nextHoliday = `${item.events[0].name} (${monthDay})`;
                                break;
                            }
                        }
                    }

                    // 缓存数据和日期
                    lunarData = { lunarInfo, holidayInfo, lastHoliday, nextHoliday };
                    lastLunarDate = dateStr;

                    return lunarData;
                } else {
                    throw new Error('API返回数据格式不正确');
                }
            } catch (error) {
                console.error('获取农历和节假日信息失败:', error);
                throw error;
            }
        }

        // 更新时间
        async function updateTime() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            let ampm = '';

            if (is12Hour) {
                ampm = hours >= 12 ? 'PM' : 'AM'; // 12小时制上午/下午
                hours = hours % 12;
                hours = hours ? hours : 12; // 12点特殊处理
            }

            const hoursStr = hours.toString().padStart(2, '0');
            const timeStr = showSeconds 
                ? `${hoursStr}:${minutes}:${seconds} ${ampm}` 
                : `${hoursStr}:${minutes} ${ampm}`; // 时间格式

            document.getElementById('currentTime').textContent = timeStr; // 更新时间显示

            // 更新日期信息
            const year = now.getFullYear();
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const day = now.getDate().toString().padStart(2, '0');
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六']; // 星期数组，可自定义修改
            const weekday = weekdays[now.getDay()];

            const dateInfo = `${year}年${month}月${day}日`; // 日期格式，可自定义修改
            document.getElementById('dateInfo').textContent = dateInfo; // 更新日期显示
            document.getElementById('weekdayInfo').textContent = weekday; // 更新星期显示

            // 更新农历和节假日信息
            if (showLunar) {
                try {
                    const { lunarInfo, holidayInfo, lastHoliday, nextHoliday } = await getLunarAndHoliday();
                    document.getElementById('lunarInfo').textContent = lunarInfo; // 更新农历显示
                    document.getElementById('holidayInfo').textContent = holidayInfo ? `今日节日：${holidayInfo}` : ''; // 更新节假日显示
                    document.getElementById('lastHolidayInfo').textContent = lastHoliday ? `上个节日：${lastHoliday}` : ''; // 更新上个节日显示
                    document.getElementById('nextHolidayInfo').textContent = nextHoliday ? `下个节日：${nextHoliday}` : ''; // 更新下个节日显示
                } catch (error) {
                    console.error('获取农历信息失败:', error);
                    document.getElementById('lunarInfo').textContent = '获取失败';
                    document.getElementById('holidayInfo').textContent = '请检查网络连接';
                    document.getElementById('lastHolidayInfo').textContent = ''; // 清空上个节日显示
                    document.getElementById('nextHolidayInfo').textContent = ''; // 清空下个节日显示
                }
            } else {
                document.getElementById('lunarInfo').textContent = ''; // 清空农历显示
                document.getElementById('holidayInfo').textContent = ''; // 清空节假日显示
                document.getElementById('lastHolidayInfo').textContent = ''; // 清空上个节日显示
                document.getElementById('nextHolidayInfo').textContent = ''; // 清空下个节日显示
            }
        }
    </script>
