    <script>
        const elements = {};
        
        let realSavedPassword = null;
        const MAX_FAILED_ATTEMPTS = 5;
        const LOCKOUT_DURATION = 30 * 60 * 1000;
        const SECRET_KEY_HASH = "4813494d137e1631bba301d5acab6e7bb7aa74ce1185d456565ef51d737677b2";
        const ENCRYPTION_KEY = "leeyuchen_cache_key";
        const PASSWORD_CACHE_KEY = "password_cache";
        
        function initElements() {
            if (!elements.lightBgUrl) elements.lightBgUrl = document.getElementById('lightBgUrl');
            if (!elements.darkBgUrl) elements.darkBgUrl = document.getElementById('darkBgUrl');
            if (!elements.bgHistoryList) elements.bgHistoryList = document.getElementById('bgHistoryList');
            if (!elements.bgModal) elements.bgModal = document.getElementById('bgModal');
            if (!elements.modeIcon) elements.modeIcon = document.getElementById('modeIcon');
            if (!elements.passwordInput) elements.passwordInput = document.getElementById('password');
            if (!elements.rememberPwd) elements.rememberPwd = document.getElementById('rememberPwd');
            if (!elements.autoLogin) elements.autoLogin = document.getElementById('autoLogin');
        }
        
        document.addEventListener('DOMContentLoaded', initElements);
        
        // 默认背景图URL，用于直接使用浏览器缓存
        const DEFAULT_LIGHT_BG = 'https://wp.upx8.com/api.php';
        const DEFAULT_DARK_BG = 'https://cdn-hsyq-static.shanhutech.cn/bizhi/staticwp/202408/aa5f5cb60290872203fcd14dfa10e9d5--2308701055.jpg';
        
        const ImageCache = {
            db: null,
            
            async initDB() {
                if (this.db) return this.db;
                
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open('BackgroundImageCache', 1);
                    
                    request.onupgradeneeded = function(event) {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains('images')) {
                            db.createObjectStore('images', { keyPath: 'url' });
                        }
                    };
                    
                    request.onsuccess = function(event) {
                        ImageCache.db = event.target.result;
                        resolve(ImageCache.db);
                    };
                    
                    request.onerror = function(event) {
                        reject('IndexedDB初始化失败');
                    };
                });
            },
            
            async storeImage(url, blob) {
                try {
                    const db = await this.initDB();
                    const transaction = db.transaction(['images'], 'readwrite');
                    const store = transaction.objectStore('images');
                    store.put({ url, blob, timestamp: Date.now() });
                    return true;
                } catch (error) {
                    console.log('存储图片失败:', error);
                    return false;
                }
            },
            
            async getImage(url) {
                try {
                    const db = await this.initDB();
                    const transaction = db.transaction(['images'], 'readonly');
                    const store = transaction.objectStore('images');
                    const request = store.get(url);
                    
                    return new Promise((resolve) => {
                        request.onsuccess = function(event) {
                            resolve(event.target.result);
                        };
                        request.onerror = function() {
                            resolve(null);
                        };
                    });
                } catch (error) {
                    console.log('获取图片失败:', error);
                    return null;
                }
            },
            
            async cleanup() {
                try {
                    const db = await this.initDB();
                    const transaction = db.transaction(['images'], 'readwrite');
                    const store = transaction.objectStore('images');
                    const request = store.openCursor();
                    
                    const now = Date.now();
                    const oneWeekAgo = now - 7 * 24 * 60 * 60 * 1000;
                    
                    return new Promise((resolve) => {
                        request.onsuccess = function(event) {
                            const cursor = event.target.result;
                            if (cursor) {
                                if (cursor.value.timestamp < oneWeekAgo) {
                                    cursor.delete();
                                }
                                cursor.continue();
                            } else {
                                resolve();
                            }
                        };
                    });
                } catch (error) {
                    console.log('清理过期图片失败:', error);
                }
            }
        };
        
        // 检查是否为默认背景图
        function isDefaultBackground(url) {
            return url === DEFAULT_LIGHT_BG || url === DEFAULT_DARK_BG;
        }
        
        async function loadBackgroundImage(url) {
            // 对于默认背景图，直接使用原始URL，利用浏览器缓存
            if (isDefaultBackground(url)) {
                return url;
            }
            
            // 对于自定义背景图，使用缓存
            try {
                const cachedImage = await ImageCache.getImage(url);
                if (cachedImage) {
                    const blobUrl = URL.createObjectURL(cachedImage.blob);
                    return blobUrl;
                } else {
                    const response = await fetch(url);
                    if (response.ok) {
                        const blob = await response.blob();
                        await ImageCache.storeImage(url, blob);
                        const blobUrl = URL.createObjectURL(blob);
                        return blobUrl;
                    }
                }
            } catch (error) {
                console.log('加载图片失败:', error);
            }
            
            return url;
        }
        
        // 延迟初始化缓存和清理操作
        function initCacheAsync() {
            // 延迟执行缓存初始化和清理，不阻塞页面加载
            setTimeout(async () => {
                try {
                    const lightBgImage = localStorage.getItem('lightBgImage') || DEFAULT_LIGHT_BG;
                    const darkBgImage = localStorage.getItem('darkBgImage') || DEFAULT_DARK_BG;
                    
                    // 并行缓存两个背景图
                    await Promise.all([
                        loadBackgroundImage(lightBgImage),
                        loadBackgroundImage(darkBgImage)
                    ]);
                    
                    // 清理过期缓存
                    await ImageCache.cleanup();
                } catch (e) {
                    console.log('背景图缓存操作失败:', e);
                }
            }, 1000); // 延迟1秒执行
        }
        
        (function() {
            try {
                const isDark = localStorage.getItem('darkMode') === 'true';
                
                function setMode() {
                    const body = document.body;
                    if (body) {
                        if (isDark) {
                            body.classList.add('dark-mode', 'hope-ui-dark');
                            body.classList.remove('hope-ui-light');
                        } else {
                            body.classList.remove('dark-mode', 'hope-ui-dark');
                            body.classList.add('hope-ui-light');
                        }
                    }
                    
                    if (elements.modeIcon) {
                        elements.modeIcon.textContent = isDark ? '🌙' : '☀️';
                    } else {
                        const modeIcon = document.getElementById('modeIcon');
                        if (modeIcon) {
                            elements.modeIcon = modeIcon;
                            modeIcon.textContent = isDark ? '🌙' : '☀️';
                        }
                    }
                }
                
                document.addEventListener('DOMContentLoaded', function() {
                    initElements();
                    setMode();
                    initializeBackground();
                    // 页面加载完成后初始化缓存
                    initCacheAsync();
                });
            } catch (error) {
                console.log('模式设置读取失败，使用默认白天模式');
            }
        })();
        
        // 初始化背景
        function initializeBackground() {
            const backgroundContainer = document.getElementById('backgroundContainer');
            const backgroundImg = backgroundContainer.querySelector('img');
            
            // 根据当前模式设置正确的背景图片
            const isDark = document.body.classList.contains('dark-mode');
            const lightBgImage = localStorage.getItem('lightBgImage') || DEFAULT_LIGHT_BG;
            const darkBgImage = localStorage.getItem('darkBgImage') || DEFAULT_DARK_BG;
            const initialUrl = isDark ? darkBgImage : lightBgImage;
            
            // 直接使用原始URL设置图片，利用浏览器缓存
            if (isDefaultBackground(initialUrl)) {
                backgroundImg.src = initialUrl;
                
                // 图片加载完成后开始动画
                backgroundImg.onload = function() {
                    backgroundContainer.classList.add('loaded');
                };
                
                // 如果图片已经加载完成（缓存），直接触发动画
                if (backgroundImg.complete) {
                    backgroundImg.onload();
                }
            } else {
                // 对于自定义背景图，使用缓存
                loadBackgroundImage(initialUrl).then(blobUrl => {
                    backgroundImg.src = blobUrl;
                    
                    backgroundImg.onload = function() {
                        backgroundContainer.classList.add('loaded');
                    };
                    
                    if (backgroundImg.complete) {
                        backgroundImg.onload();
                    }
                }).catch(error => {
                    console.error('加载背景图片失败:', error);
                    backgroundImg.src = initialUrl;
                    
                    backgroundImg.onload = function() {
                        backgroundContainer.classList.add('loaded');
                    };
                    
                    if (backgroundImg.complete) {
                        backgroundImg.onload();
                    }
                });
            }
        }
        
        function showToast(message, isError = false) {
            const fragment = document.createDocumentFragment();
            const toast = document.createElement('div');
            toast.className = `toast-notice ${isError ? 'toast-error' : ''}`;
            toast.textContent = message;
            fragment.appendChild(toast);
            document.body.appendChild(fragment);
            
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.parentNode.removeChild(toast);
                }
            }, 3000);
        }
        
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hash = await window.crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function getKey() {
            const encoder = new TextEncoder();
            const keyMaterial = await window.crypto.subtle.importKey('raw', encoder.encode(ENCRYPTION_KEY), { name: 'PBKDF2' }, false, ['deriveKey']);
            return window.crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt: encoder.encode('leeyuchen_salt'), iterations: 100000, hash: 'SHA-256' },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                false,
                ['encrypt', 'decrypt']
            );
        }

        async function encrypt(data) {
            try {
                const key = await getKey();
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const encoder = new TextEncoder();
                const encrypted = await window.crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, encoder.encode(JSON.stringify(data)));
                return {
                    iv: Array.from(iv),
                    data: Array.from(new Uint8Array(encrypted))
                };
            } catch (error) {
                console.error('加密失败:', error);
                throw error;
            }
        }

        async function decrypt(encryptedData) {
            try {
                const key = await getKey();
                const decrypted = await window.crypto.subtle.decrypt({ name: 'AES-GCM', iv: new Uint8Array(encryptedData.iv) }, key, new Uint8Array(encryptedData.data));
                const decoder = new TextDecoder();
                return JSON.parse(decoder.decode(decrypted));
            } catch (error) {
                console.error('解密失败:', error);
                localStorage.removeItem(PASSWORD_CACHE_KEY);
                return null;
            }
        }

        async function savePassword(password) {
            try {
                const encrypted = await encrypt(password);
                localStorage.setItem(PASSWORD_CACHE_KEY, JSON.stringify(encrypted));
                return true;
            } catch (error) {
                console.error('保存密码失败:', error);
                return false;
            }
        }

        async function loadPassword() {
            try {
                const encrypted = localStorage.getItem(PASSWORD_CACHE_KEY);
                return encrypted ? await decrypt(JSON.parse(encrypted)) : null;
            } catch (error) {
                console.error('加载密码失败:', error);
                localStorage.removeItem(PASSWORD_CACHE_KEY);
                return null;
            }
        }

        function clearPassword() {
            localStorage.removeItem(PASSWORD_CACHE_KEY);
            realSavedPassword = null;
        }
        
        function getFailedAttempts() {
            const attempts = localStorage.getItem('failedAttempts');
            return attempts ? parseInt(attempts, 10) : 0;
        }
        
        function setFailedAttempts(attempts) {
            localStorage.setItem('failedAttempts', attempts.toString());
        }
        
        function getLockoutTime() {
            const lockoutTime = localStorage.getItem('lockoutTime');
            return lockoutTime ? parseInt(lockoutTime, 10) : 0;
        }
        
        function setLockoutTime(time) {
            localStorage.setItem('lockoutTime', time.toString());
        }
        
        function isLockedOut() {
            const lockoutTime = getLockoutTime();
            if (!lockoutTime) return false;
            
            return Date.now() < lockoutTime + LOCKOUT_DURATION;
        }
        
        function resetLoginAttempts() {
            setFailedAttempts(0);
            setLockoutTime(0);
        }
        
        async function login() {
            if (isLockedOut()) {
                showToast('账户已被暂时锁定，请30分钟后再试', true);
                return;
            }
            
            let inputPassword = elements.passwordInput.value === '********' && realSavedPassword ? realSavedPassword : elements.passwordInput.value.trim();
            
            if (!inputPassword) {
                showToast('请输入密码', true);
                return;
            }
            
            try {
                const hashedInput = await hashPassword(inputPassword);
                if (hashedInput !== SECRET_KEY_HASH) {
                    let failedAttempts = getFailedAttempts() + 1;
                    setFailedAttempts(failedAttempts);
                    
                    if (failedAttempts >= MAX_FAILED_ATTEMPTS) {
                        setLockoutTime(Date.now());
                        showToast('密码错误次数过多，请30分钟后再试', true);
                    } else {
                        showToast(`登录失败，请检查密码 (${failedAttempts}/${MAX_FAILED_ATTEMPTS})`, true);
                    }
                    return;
                }
                
                resetLoginAttempts();
                
                if (elements.rememberPwd && elements.rememberPwd.checked) {
                    const saved = await savePassword(inputPassword);
                    if (!saved) {
                        showToast('保存密码失败，但登录成功', true);
                    }
                } else {
                    clearPassword();
                }
                
                const settings = {
                    autoLogin: elements.autoLogin && elements.autoLogin.checked,
                    darkMode: document.body.classList.contains('dark-mode')
                };
                
                localStorage.setItem('isLogin', 'true');
                
                showToast('登录成功，正在跳转到主页...');
                setTimeout(() => {
                    window.location.href = '/lychome';
                }, 1000);
            } catch (error) {
                console.error('登录失败:', error);
                showToast('登录失败，请检查密码', true);
            }
        }
        
        function toggleMode() {
            requestAnimationFrame(() => {
                const body = document.body;
                const isDark = !body.classList.contains('dark-mode');
                
                if (isDark) {
                    body.classList.add('dark-mode', 'hope-ui-dark');
                    body.classList.remove('hope-ui-light');
                } else {
                    body.classList.remove('dark-mode', 'hope-ui-dark');
                    body.classList.add('hope-ui-light');
                }
                
                if (elements.modeIcon) {
                    elements.modeIcon.textContent = isDark ? '🌙' : '☀️';
                } else {
                    const modeIcon = document.getElementById('modeIcon');
                    if (modeIcon) {
                        elements.modeIcon = modeIcon;
                        modeIcon.textContent = isDark ? '🌙' : '☀️';
                    }
                }
                
                // 更新背景容器中的图片
                const backgroundContainer = document.getElementById('backgroundContainer');
                const backgroundImg = backgroundContainer.querySelector('img');
                const lightBgImage = localStorage.getItem('lightBgImage') || DEFAULT_LIGHT_BG;
                const darkBgImage = localStorage.getItem('darkBgImage') || DEFAULT_DARK_BG;
                const newUrl = isDark ? darkBgImage : lightBgImage;
                
                // 重置背景容器状态
                backgroundContainer.classList.remove('loaded');
                backgroundImg.style.opacity = '0';
                backgroundImg.style.transform = 'scale(1.25)';
                backgroundImg.style.filter = 'blur(10px) brightness(0.8)';
                
                // 直接使用原始URL设置图片，利用浏览器缓存
                if (isDefaultBackground(newUrl)) {
                    backgroundImg.src = newUrl;
                    backgroundImg.onload = function() {
                        backgroundContainer.classList.add('loaded');
                        backgroundImg.style.opacity = '1';
                        backgroundImg.style.transform = 'scale(1)';
                        backgroundImg.style.filter = 'blur(0px) brightness(1)';
                    };
                } else {
                    // 对于自定义背景图，使用缓存
                    loadBackgroundImage(newUrl).then(blobUrl => {
                        backgroundImg.src = blobUrl;
                        backgroundImg.onload = function() {
                            backgroundContainer.classList.add('loaded');
                            backgroundImg.style.opacity = '1';
                            backgroundImg.style.transform = 'scale(1)';
                            backgroundImg.style.filter = 'blur(0px) brightness(1)';
                        };
                    }).catch(error => {
                        console.error('加载背景图片失败:', error);
                        backgroundImg.src = newUrl;
                        backgroundImg.onload = function() {
                            backgroundContainer.classList.add('loaded');
                            backgroundImg.style.opacity = '1';
                            backgroundImg.style.transform = 'scale(1)';
                            backgroundImg.style.filter = 'blur(0px) brightness(1)';
                        };
                    });
                }
                
                localStorage.setItem('darkMode', isDark.toString());
                
                showToast(isDark ? '已切换到夜间模式' : '已切换到白天模式');
            });
        }
        
        function manageHistory(url, historyKey, maxItems = 10) {
            if (!url) return;
            
            let history = JSON.parse(localStorage.getItem(historyKey) || '[]');
            history = history.filter(itemUrl => itemUrl !== url);
            history.unshift(url);
            history = history.slice(0, maxItems);
            localStorage.setItem(historyKey, JSON.stringify(history));
        }
        
        function loadBgSettingsToInputs() {
            const lightInput = elements.lightBgUrl;
            const darkInput = elements.darkBgUrl;
            const historyList = elements.bgHistoryList;
            
            let activeInput = null;
            let originalValue = '';
            
            function loadHistory() {
                while (historyList.firstChild) {
                    historyList.removeChild(historyList.firstChild);
                }
                
                const lightDefaultUrl = 'https://wp.upx8.com/api.php';
                const darkDefaultUrl = 'https://cdn-hsyq-static.shanhutech.cn/bizhi/staticwp/202408/aa5f5cb60290872203fcd14dfa10e9d5--2308701055.jpg';
                
                const lightDefaultItem = document.createElement('div');
                lightDefaultItem.className = 'history-item';
                lightDefaultItem.dataset.url = lightDefaultUrl;
                lightDefaultItem.textContent = '白天默认背景';
                historyList.appendChild(lightDefaultItem);
                
                const darkDefaultItem = document.createElement('div');
                darkDefaultItem.className = 'history-item';
                darkDefaultItem.dataset.url = darkDefaultUrl;
                darkDefaultItem.textContent = '夜间默认背景';
                historyList.appendChild(darkDefaultItem);
                
                let combinedHistory = new Set();
                let lightHistory = JSON.parse(localStorage.getItem('lightBgHistory') || '[]');
                let darkHistory = JSON.parse(localStorage.getItem('darkBgHistory') || '[]');
                
                lightHistory.forEach(url => combinedHistory.add(url));
                darkHistory.forEach(url => combinedHistory.add(url));
                
                let historyArray = Array.from(combinedHistory);
                
                historyArray.forEach(url => {
                    if (url !== lightDefaultUrl && url !== darkDefaultUrl) {
                        const item = document.createElement('div');
                        item.className = 'history-item';
                        item.dataset.url = url;
                        item.textContent = url.length > 150 ? url.substring(0, 53) : url;
                        historyList.appendChild(item);
                    }
                });
                
                addHistoryItemListeners();
            }
            
            function addHistoryItemListeners() {
                const historyItems = historyList.querySelectorAll('.history-item');
                historyItems.forEach(item => {
                    let currentValue = '';
                    let clickTimer = null;
                    let isClicked = false;
                    
                    item.addEventListener('mouseenter', function() {
                        if (activeInput) {
                            currentValue = activeInput.value;
                            activeInput.value = this.dataset.url;
                        }
                    });
                    
                    item.addEventListener('mouseleave', function() {
                        if (activeInput && !isClicked) {
                            activeInput.value = currentValue;
                        }
                    });
                    
                    item.addEventListener('click', function(e) {
                        e.stopPropagation();
                        if (activeInput) {
                            isClicked = true;
                            if (clickTimer) {
                                clearTimeout(clickTimer);
                            }
                            clickTimer = setTimeout(() => {
                                activeInput.value = this.dataset.url;
                                originalValue = this.dataset.url;
                                historyList.style.display = 'none';
                                setTimeout(() => {
                                    isClicked = false;
                                }, 50);
                            }, 180);
                        }
                    });
                    
                    item.addEventListener('dblclick', function(e) {
                        e.stopPropagation();
                        if (clickTimer) {
                            clearTimeout(clickTimer);
                            clickTimer = null;
                        }
                        
                        const isDefault = this.textContent === '白天默认背景' || this.textContent === '夜间默认背景';
                        if (!isDefault) {
                            if (activeInput) {
                                activeInput.value = currentValue;
                            }
                            const url = this.dataset.url;
                            let lightHistory = JSON.parse(localStorage.getItem('lightBgHistory') || '[]');
                            let darkHistory = JSON.parse(localStorage.getItem('darkBgHistory') || '[]');
                            
                            lightHistory = lightHistory.filter(itemUrl => itemUrl !== url);
                            darkHistory = darkHistory.filter(itemUrl => itemUrl !== url);
                            
                            localStorage.setItem('lightBgHistory', JSON.stringify(lightHistory));
                            localStorage.setItem('darkBgHistory', JSON.stringify(darkHistory));
                            
                            loadHistory();
                        }
                    });
                });
            }
            
            function showHistoryList(input) {
                activeInput = input;
                originalValue = input.value;
                
                const container = input.closest('.input-with-history');
                container.appendChild(historyList);
                
                historyList.style.display = 'block';
                historyList.style.position = 'absolute';
                historyList.style.top = '100%';
                historyList.style.left = '0';
                historyList.style.width = '100%';
                historyList.style.marginTop = '2px';
                historyList.style.zIndex = '1001';
            }
            
            function hideHistoryList() {
                historyList.style.display = 'none';
                activeInput = null;
            }
            
            lightInput.addEventListener('focus', function(e) {
                e.stopPropagation();
                showHistoryList(this);
            });
            
            darkInput.addEventListener('focus', function(e) {
                e.stopPropagation();
                showHistoryList(this);
            });
            
            lightInput.addEventListener('input', function() {
                hideHistoryList();
            });
            
            darkInput.addEventListener('input', function() {
                hideHistoryList();
            });
            
            document.addEventListener('click', function(e) {
                if (!lightInput.contains(e.target) && !darkInput.contains(e.target) && !historyList.contains(e.target)) {
                    hideHistoryList();
                }
            });
            
            loadHistory();
        }
        
        function openBgModal() {
            if (!elements.bgModal) initElements();
            
            const modal = elements.bgModal;
            if (modal) {
                modal.style.display = 'flex';
                
                if (!elements.lightBgUrl || !elements.darkBgUrl) initElements();
                const lightInput = elements.lightBgUrl;
                const darkInput = elements.darkBgUrl;
                
                if (lightInput) {
                    lightInput.value = localStorage.getItem('lightBgImage') || '';
                }
                if (darkInput) {
                    darkInput.value = localStorage.getItem('darkBgImage') || '';
                }
                
                loadBgSettingsToInputs();
            }
        }
        
        function closeBgModal() {
            if (!elements.bgModal) initElements();
            if (elements.bgModal) {
                elements.bgModal.style.display = 'none';
            }
        }
        
        async function saveBgSetting() {
            if (!elements.lightBgUrl || !elements.darkBgUrl) initElements();
            
            if (elements.lightBgUrl && elements.darkBgUrl) {
                const lightUrl = elements.lightBgUrl.value;
                const darkUrl = elements.darkBgUrl.value;
                
                if (lightUrl) {
                    const lightImageUrl = await loadBackgroundImage(lightUrl);
                    document.documentElement.style.setProperty('--light-bg-image', `url("${lightImageUrl}")`);
                    localStorage.setItem('lightBgImage', lightUrl);
                    manageHistory(lightUrl, 'lightBgHistory');
                }
                if (darkUrl) {
                    const darkImageUrl = await loadBackgroundImage(darkUrl);
                    document.documentElement.style.setProperty('--dark-bg-image', `url("${darkImageUrl}")`);
                    localStorage.setItem('darkBgImage', darkUrl);
                    manageHistory(darkUrl, 'darkBgHistory');
                }
                
                // 更新背景容器中的图片
                const backgroundContainer = document.getElementById('backgroundContainer');
                const backgroundImg = backgroundContainer.querySelector('img');
                const isDark = document.body.classList.contains('dark-mode');
                const newUrl = isDark ? darkUrl || 'https://cdn-hsyq-static.shanhutech.cn/bizhi/staticwp/202408/aa5f5cb60290872203fcd14dfa10e9d5--2308701055.jpg' : lightUrl || 'https://wp.upx8.com/api.php';
                
                // 重置背景容器状态
                backgroundContainer.classList.remove('loaded');
                backgroundImg.style.opacity = '0';
                backgroundImg.style.transform = 'scale(1.25)';
                backgroundImg.style.filter = 'blur(10px) brightness(0.8)';
                
                // 加载新图片
                backgroundImg.src = newUrl;
                backgroundImg.onload = function() {
                    backgroundContainer.classList.add('loaded');
                    backgroundImg.style.opacity = '1';
                    backgroundImg.style.transform = 'scale(1)';
                    backgroundImg.style.filter = 'blur(0px) brightness(1)';
                };
                
                closeBgModal();
                showToast('背景设置已保存');
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const rememberPwd = document.getElementById('rememberPwd');
            const autoLogin = document.getElementById('autoLogin');
            
            if (rememberPwd) {
                rememberPwd.checked = localStorage.getItem('rememberPwd') === 'true';
            }
            if (autoLogin) {
                autoLogin.checked = localStorage.getItem('autoLogin') === 'true';
            }
            
            if (rememberPwd) {
                rememberPwd.addEventListener('change', function() {
                    localStorage.setItem('rememberPwd', this.checked.toString());
                });
            }
            if (autoLogin) {
                autoLogin.addEventListener('change', function() {
                    localStorage.setItem('autoLogin', this.checked.toString());
                });
            }
        });
        
        document.addEventListener('DOMContentLoaded', async function() {
            const passwordInput = document.getElementById('password');
            if (passwordInput) {
                passwordInput.focus();
            }
            
            initElements();
            
            const savedPassword = await loadPassword();
            if (savedPassword) {
                realSavedPassword = savedPassword;
                elements.passwordInput.value = '********';
                elements.passwordInput.readOnly = true;
                
                elements.passwordInput.addEventListener('click', function() {
                    if (realSavedPassword) {
                        this.readOnly = false;
                        this.value = '';
                        realSavedPassword = null;
                        this.focus();
                    }
                });
                
                elements.passwordInput.addEventListener('input', function() {
                    if (realSavedPassword) {
                        if (this.value !== realSavedPassword && this.value !== '') {
                            this.value = '********';
                        }
                    }
                });
            }
            
            const autoLogin = localStorage.getItem('autoLogin') === 'true';
            if (autoLogin && elements.autoLogin) {
                elements.autoLogin.checked = true;
                elements.rememberPwd.checked = true;
                if (savedPassword) {
                    setTimeout(() => {
                        login();
                    }, 500);
                }
            }
        });
        
        document.addEventListener('DOMContentLoaded', function() {
            const headerText = document.getElementById('headerText');
            if (headerText) {
                let clickCount = 0;
                let clickTimer = null;
                const DOUBLE_CLICK_INTERVAL = 180;
                
                headerText.addEventListener('click', function() {
                    clickCount++;
                    
                    if (clickTimer) {
                        clearTimeout(clickTimer);
                    }
                    
                    if (clickCount === 1) {
                        clickTimer = setTimeout(function() {
                            showToast('刷新页面');
                            location.reload();
                            clickCount = 0;
                        }, DOUBLE_CLICK_INTERVAL);
                    } else if (clickCount === 2) {
                        clearTimeout(clickTimer);
                        showToast('跳转到GitHub仓库');
                        window.location.href='https://github.com/leeyuchen4073/leeyuchen.github.io';
                        clickCount = 0;
                    }
                });
            }
        });
        
        document.addEventListener('DOMContentLoaded', function() {
            const passwordInput = document.getElementById('password');
            if (passwordInput) {
                passwordInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        login();
                    }
                });
            }
        });
        
        document.addEventListener('DOMContentLoaded', function() {
            const clearBtn = document.getElementById('clearBtn');
            const passwordInput = document.getElementById('password');
            
            if (clearBtn) {
                let clickCount = 0;
                let clickTimer = null;
                const CLICK_INTERVAL = 300;
                
                clearBtn.addEventListener('click', function() {
                    clickCount++;
                    
                    if (clickTimer) {
                        clearTimeout(clickTimer);
                    }
                    
                    clickTimer = setTimeout(function() {
                        switch (clickCount) {
                            case 1:
                                if (passwordInput) {
                                    passwordInput.value = '';
                                    showToast('已清除输入框内容');
                                }
                                break;
                            case 2:
                                if (passwordInput) {
                                    passwordInput.value = '';
                                }
                                localStorage.removeItem('passwordCache');
                                showToast('已清除输入框内容和密码缓存');
                                break;
                            case 3:
                                localStorage.removeItem('lightBgImage');
                                localStorage.removeItem('darkBgImage');
                                document.documentElement.style.setProperty('--light-bg-image', `url("https://wp.upx8.com/api.php")`);
                                document.documentElement.style.setProperty('--dark-bg-image', `url("https://cdn-hsyq-static.shanhutech.cn/bizhi/staticwp/202408/aa5f5cb60290872203fcd14dfa10e9d5--2308701055.jpg")`);
                                showToast('已恢复默认背景');
                                break;
                            case 4:
                                localStorage.removeItem('passwordCache');
                                localStorage.removeItem('loginLimit');
                                showToast('已清除限制登录状态和密码缓存');
                                break;
                        }
                        
                        if (passwordInput) {
                            passwordInput.focus();
                        }
                        
                        clickCount = 0;
                    }, CLICK_INTERVAL);
                });
            }
        });
        
        document.addEventListener('DOMContentLoaded', function() {
            if (!elements.bgModal) initElements();
            const modal = elements.bgModal;
            if (modal) {
                let isDragging = false;
                let startX, startY;
                
                modal.addEventListener('mousedown', function(e) {
                    startX = e.clientX;
                    startY = e.clientY;
                    isDragging = false;
                });
                
                modal.addEventListener('mousemove', function(e) {
                    if (Math.abs(e.clientX - startX) > 5 || Math.abs(e.clientY - startY) > 5) {
                        isDragging = true;
                    }
                });
                
                modal.addEventListener('mouseup', function(e) {
                    if (!isDragging && e.target === modal) {
                        saveBgSetting();
                    }
                });
            }
        });

        function loadHitokoto() {
            return new Promise((resolve) => {
                const hitokotoEl = document.getElementById('hitokoto');
                let currentScript = null;
                let currentTimeout = null;
                
                const defaultSentence = '人生最大的遗憾,就是在最无能为力的时候遇到一个想要保护一生的人.';
                
                const apis = [
                    'https://v1.hitokoto.cn/?encode=js&select=%23hitokoto',
                    'https://international.v1.hitokoto.cn/?encode=js&select=%23hitokoto'
                ];
                
                function addSignature() {
                    if (hitokotoEl && hitokotoEl.innerHTML.indexOf('Ani Cloud') === -1) {
                        hitokotoEl.innerHTML += '<p style="margin-left: 16rem;font-size: 8pt;margin-top: 5px;"><small><a href="https://mprogram.boomegg.cn/box/game/wx77200645d1c7f35f/h5?&game_platform=wechat" class="signature-link">—— Ani Cloud</a></small></p>';
                    }
                }
                
                if (hitokotoEl) {
                    const observer = new MutationObserver((mutations) => {
                        mutations.forEach((mutation) => {
                            if (mutation.type === 'childList' || mutation.type === 'characterData') {
                                setTimeout(addSignature, 100);
                            }
                        });
                    });
                    
                    observer.observe(hitokotoEl, {
                        childList: true,
                        characterData: true,
                        subtree: true
                    });
                }
                
                let apiIndex = 0;
                
                function tryLoadApi() {
                    if (apiIndex >= apis.length) {
                        if (hitokotoEl) {
                            hitokotoEl.innerHTML = '<a href="https://hitokoto.cn/" id="hitokoto_text" style="color: #25D366;">“ ' + defaultSentence + '”</a>';
                            addSignature();
                        }
                        if (hitokotoEl && hitokotoEl.parentElement) {
                            hitokotoEl.parentElement.classList.add('loaded');
                        }
                        resolve();
                        return;
                    }
                    
                    if (currentScript) {
                        document.head.removeChild(currentScript);
                    }
                    if (currentTimeout) {
                        clearTimeout(currentTimeout);
                    }
                    
                    currentTimeout = setTimeout(() => {
                        apiIndex++;
                        tryLoadApi();
                    }, 3000);
                    
                    currentScript = document.createElement('script');
                    currentScript.src = apis[apiIndex];
                    currentScript.defer = true;
                    
                    currentScript.onload = function() {
                        clearTimeout(currentTimeout);
                        if (hitokotoEl) {
                            const currentContent = hitokotoEl.textContent;
                            if (currentContent && currentContent.indexOf('“') !== 0) {
                                hitokotoEl.innerHTML = '<a href="https://hitokoto.cn/" id="hitokoto_text" style="color: #25D366;">“ ' + currentContent + '”</a>';
                            }
                        }
                        if (hitokotoEl && hitokotoEl.parentElement) {
                            hitokotoEl.parentElement.classList.add('loaded');
                        }
                        setTimeout(addSignature, 200);
                        resolve();
                    };
                    
                    currentScript.onerror = function() {
                        clearTimeout(currentTimeout);
                        apiIndex++;
                        tryLoadApi();
                    };
                    
                    document.head.appendChild(currentScript);
                }
                
                tryLoadApi();
            });
        }

        let ipCache = null;
        const IP_CACHE_EXPIRY = 3600000;

        const CacheManager = {
            cacheIP(data) {
                ipCache = {
                    data: data,
                    timestamp: Date.now()
                };
            },
            getIPCache() {
                const now = Date.now();
                if (ipCache && (now - ipCache.timestamp < IP_CACHE_EXPIRY)) {
                    return ipCache.data;
                }
                return null;
            }
        };

        function loadVisitorInfo() {
            return new Promise((resolve) => {
                const welcomeEl = document.getElementById('welcome');
                
                const cachedIP = CacheManager.getIPCache();
                if (cachedIP) {
                    const ip = cachedIP.ip;
                    const address = cachedIP.address;
                    const isp = cachedIP.isp;
                    const welcomeMessage = '欢迎 <a href="https://api.nange.cn/">' + address + '</a> <a href="https://test.ustc.edu.cn/">' + isp + 'IP：</a> <a href="https://ipw.cn/ip/" class="ip-address">' + ip + '</a> 的小伙伴访问本站';
                    if (welcomeEl) {
                        welcomeEl.innerHTML = welcomeMessage;
                        welcomeEl.classList.add('loaded');
                    }
                    resolve();
                    return;
                }
                
                fetch('https://v2.xxapi.cn/api/ip')
                    .then(response => response.json())
                    .then(data => {
                        if (data.code === 200 && data.data) {
                            const ip = data.data.ip;
                            const address = data.data.address || '';
                            const isp = data.data.isp || '';
                            
                            const ipData = { ip: ip, address: address, isp: isp };
                            CacheManager.cacheIP(ipData);
                            
                            const welcomeMessage = '欢迎 <a href="https://api.nange.cn/">' + address + '</a> <a href="https://test.ustc.edu.cn/">' + isp + 'IP：</a> <a href="https://ipw.cn/ip/" class="ip-address">' + ip + '</a> 的小伙伴访问本站';
                            
                            if (welcomeEl) {
                                welcomeEl.innerHTML = welcomeMessage;
                                welcomeEl.classList.add('loaded');
                            }
                        }
                        resolve();
                    })
                    .catch(error => {
                        console.error("IP获取失败：", error);
                        if (welcomeEl) {
                            welcomeEl.textContent = "欢迎访问本站";
                            welcomeEl.classList.add('loaded');
                        }
                        resolve();
                    });
            });
        }

        function updateRuntime() {
            const startDate = new Date('2026-02-20T00:00:00');
            const now = new Date();
            const elapsed = now - startDate;

            const days = Math.floor(elapsed / (1000 * 60 * 60 * 24));
            const hours = Math.floor((elapsed % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((elapsed % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((elapsed % (1000 * 60)) / 1000);

            const runtimeEl = document.getElementById('runtime');
            if (runtimeEl) {
                runtimeEl.innerHTML = '站点运行时间：<span style="color: #25D366;font-weight: bold;opacity: 0.99;">' + days + '天 ' + hours + '小时 ' + minutes + '分 ' + seconds + '秒</span>';
                runtimeEl.parentElement.classList.add('loaded');
            }
        }

        async function initFooterInfo() {
            await loadHitokoto();
            await loadVisitorInfo();
            updateRuntime();
            setInterval(updateRuntime, 1000);
        }

        document.addEventListener('DOMContentLoaded', function() {
            initFooterInfo();
        });
    </script>
